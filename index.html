<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>AI 마을 — 살아 움직이는 연구형 시뮬레이션</title>
<style>
:root{
  color-scheme:dark;
  --bg:#060814;
  --bg2:#0a1020;
  --surface:rgba(9,14,26,.72);
  --surface2:rgba(255,255,255,.055);
  --surface3:rgba(255,255,255,.085);
  --ink:#f4f8ff;
  --soft:#d9e4f5;
  --muted:#91a0b8;
  --line:rgba(255,255,255,.115);
  --line2:rgba(255,255,255,.18);
  --blue:#89d8ff;
  --violet:#d9b7ff;
  --gold:#ffe28a;
  --green:#a8f3bd;
  --rose:#ff9aaa;
  --cyan:#9ff4ef;
  --shadow:0 28px 90px rgba(0,0,0,.48);
  --shadow2:0 14px 44px rgba(0,0,0,.34);
  --r:28px;
}
*{box-sizing:border-box}
html,body{width:100%;height:100%;margin:0}
body{
  overflow:hidden;
  color:var(--ink);
  font-family:ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",sans-serif;
  background:
    radial-gradient(circle at 12% -8%,rgba(137,216,255,.34),transparent 34%),
    radial-gradient(circle at 80% 0%,rgba(217,183,255,.23),transparent 31%),
    radial-gradient(circle at 60% 110%,rgba(168,243,189,.14),transparent 34%),
    linear-gradient(180deg,#10182b 0%,#060814 64%,#04050b 100%);
}
body::before{
  content:"";
  position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    linear-gradient(rgba(255,255,255,.025) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,255,255,.018) 1px,transparent 1px);
  background-size:42px 42px;
  mask-image:radial-gradient(circle at 50% 30%,black,transparent 78%);
}
body::after{
  content:"";
  position:fixed;inset:0;pointer-events:none;z-index:0;opacity:.45;
  background:radial-gradient(circle at 50% 48%,transparent 0 46%,rgba(0,0,0,.42) 100%);
}
button,input{font:inherit} button{border:0;background:none;color:inherit;cursor:pointer} input{color:inherit}
button:focus-visible,input:focus-visible{outline:2px solid rgba(137,216,255,.72);outline-offset:2px}
#app{
  position:relative;z-index:1;width:100%;height:100%;padding:16px;
  display:grid;grid-template-columns:minmax(680px,1fr) 384px;grid-template-rows:82px minmax(0,1fr) 276px;gap:16px;
}
.top{
  grid-column:1/3;display:grid;grid-template-columns:minmax(320px,1fr) auto auto;gap:14px;align-items:center;
  padding:13px 15px;border:1px solid var(--line);border-radius:26px;
  background:linear-gradient(180deg,rgba(255,255,255,.086),rgba(255,255,255,.038));
  backdrop-filter:blur(22px);box-shadow:var(--shadow2);position:relative;overflow:hidden;
}
.top::before{content:"";position:absolute;inset:0;border-radius:inherit;pointer-events:none;background:linear-gradient(90deg,rgba(137,216,255,.16),transparent 34%,rgba(255,226,138,.08) 70%,transparent)}
.brand{display:flex;align-items:center;gap:14px;min-width:0;position:relative}.mark{width:48px;height:48px;border-radius:18px;display:grid;place-items:center;color:#06101a;font-weight:950;font-size:20px;background:conic-gradient(from 220deg,var(--blue),var(--violet),var(--gold),var(--green),var(--blue));box-shadow:0 0 46px rgba(137,216,255,.22),inset 0 0 0 1px rgba(255,255,255,.5)}
.brand h1{margin:0;font-size:20px;letter-spacing:-.045em;line-height:1}.brand p{margin:6px 0 0;font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:680px}
.stats{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;position:relative}.stat{--v:50;position:relative;min-width:78px;padding:8px 10px 10px;border:1px solid var(--line);border-radius:17px;background:linear-gradient(180deg,rgba(255,255,255,.075),rgba(255,255,255,.035));box-shadow:inset 0 1px 0 rgba(255,255,255,.08);font-size:11px;color:var(--muted);overflow:hidden}.stat::after{content:"";position:absolute;left:9px;right:9px;bottom:5px;height:2px;border-radius:999px;background:linear-gradient(90deg,var(--blue),var(--green));transform-origin:left;transform:scaleX(calc(var(--v)/100));opacity:.85}.stat span{display:block;white-space:nowrap}.stat b{display:block;margin-top:2px;color:#fff;font-size:15px;letter-spacing:-.03em}.stat.noise::after{background:linear-gradient(90deg,var(--gold),var(--rose))}.stat.noise b{color:var(--rose)}
.controls{display:flex;gap:8px;justify-content:flex-end;position:relative}.btn{padding:10px 12px;border:1px solid var(--line);border-radius:15px;background:rgba(255,255,255,.06);font-size:12px;white-space:nowrap;box-shadow:inset 0 1px 0 rgba(255,255,255,.06);transition:transform .16s ease,background .16s ease,border-color .16s ease}.btn:hover{transform:translateY(-1px);background:rgba(255,255,255,.105);border-color:var(--line2)}.btn:active{transform:translateY(0)}.btn.primary{background:linear-gradient(135deg,rgba(137,216,255,.22),rgba(217,183,255,.15));border-color:rgba(137,216,255,.34)}.btn.warn{border-color:rgba(255,226,138,.28);background:rgba(255,226,138,.075)}
.worldCard{grid-column:1/2;grid-row:2/3;position:relative;overflow:hidden;isolation:isolate;min-height:520px;border:1px solid rgba(255,255,255,.12);border-radius:var(--r);background:#0b111b;box-shadow:var(--shadow)}
.worldCard::before{content:"";position:absolute;inset:0;z-index:2;pointer-events:none;border-radius:inherit;box-shadow:inset 0 1px 0 rgba(255,255,255,.13),inset 0 -80px 110px rgba(2,4,9,.24)}
#world{position:absolute;inset:0;width:100%;height:100%;display:block}.hud{position:absolute;left:16px;top:16px;z-index:5;display:flex;gap:8px;flex-wrap:wrap}.chip{padding:8px 11px;border:1px solid rgba(255,255,255,.14);border-radius:999px;background:rgba(5,9,16,.54);backdrop-filter:blur(18px);font-size:12px;color:var(--soft);box-shadow:0 12px 38px rgba(0,0,0,.22)}.chip b{color:#fff;margin-left:4px}.legend{position:absolute;right:16px;top:16px;z-index:5;max-width:280px;text-align:right;font-size:12px;line-height:1.56;color:rgba(244,248,255,.70);text-shadow:0 1px 9px rgba(0,0,0,.48)}
.seedBox{position:absolute;left:18px;right:18px;bottom:18px;z-index:6;display:grid;grid-template-columns:1fr auto auto;gap:8px;padding:8px;border-radius:22px;border:1px solid rgba(255,255,255,.14);background:rgba(5,9,16,.68);backdrop-filter:blur(22px);box-shadow:0 20px 70px rgba(0,0,0,.32),inset 0 1px 0 rgba(255,255,255,.08)}.seedBox input{min-width:0;border:0;outline:0;background:transparent;padding:10px 9px;font-size:13px}.seedBox input::placeholder{color:rgba(217,228,245,.52)}.seedBox button{padding:10px 13px;border-radius:15px;border:1px solid rgba(137,216,255,.28);background:linear-gradient(135deg,rgba(137,216,255,.16),rgba(217,183,255,.09));font-size:12px;font-weight:700;transition:.16s}.seedBox button:hover{transform:translateY(-1px);background:rgba(137,216,255,.18)}.seedBox button.secondary{border-color:rgba(255,255,255,.14);background:rgba(255,255,255,.065);font-weight:600}
.toast{position:absolute;left:50%;top:76px;z-index:30;transform:translateX(-50%) translateY(-8px);opacity:0;transition:.24s ease;padding:10px 14px;border:1px solid rgba(137,216,255,.32);border-radius:999px;background:rgba(5,9,16,.78);backdrop-filter:blur(18px);box-shadow:var(--shadow2);font-size:12px;color:var(--soft)}.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.inspect{grid-column:2/3;grid-row:2/4;min-height:0;display:flex;flex-direction:column;border:1px solid var(--line);border-radius:var(--r);background:linear-gradient(180deg,rgba(12,18,32,.82),rgba(6,9,18,.76));backdrop-filter:blur(22px);box-shadow:var(--shadow);overflow:hidden}.inspectHead{padding:18px 18px 15px;border-bottom:1px solid var(--line);display:flex;align-items:flex-start;justify-content:space-between;gap:12px;position:relative}.inspectHead::after{content:"";position:absolute;left:18px;right:18px;bottom:-1px;height:1px;background:linear-gradient(90deg,transparent,var(--blue),transparent);opacity:.34}.inspectHead h2{margin:0;font-size:19px;letter-spacing:-.035em}.inspectHead p{margin:6px 0 0;font-size:12px;line-height:1.55;color:var(--muted)}.badge{white-space:nowrap;padding:7px 9px;border-radius:999px;border:1px solid rgba(137,216,255,.26);background:rgba(137,216,255,.11);font-size:11px;color:var(--blue);box-shadow:0 0 28px rgba(137,216,255,.08)}
.inspectBody{min-height:0;overflow:auto;padding:15px;scrollbar-gutter:stable}.profile{display:flex;gap:13px;align-items:center;margin-bottom:14px}.avatar{width:60px;height:60px;border-radius:22px;border:1px solid rgba(255,255,255,.15);display:grid;place-items:center;font-size:28px;background:linear-gradient(180deg,rgba(255,255,255,.10),rgba(255,255,255,.035));box-shadow:0 16px 46px rgba(0,0,0,.25),inset 0 1px 0 rgba(255,255,255,.10)}.profile h3{margin:0;font-size:21px;letter-spacing:-.04em}.profile p{margin:5px 0 0;font-size:12px;color:var(--muted);line-height:1.55}
.card{border:1px solid var(--line);background:linear-gradient(180deg,rgba(255,255,255,.063),rgba(255,255,255,.033));border-radius:21px;padding:13px;margin-bottom:10px;box-shadow:inset 0 1px 0 rgba(255,255,255,.055)}.card:hover{border-color:rgba(255,255,255,.16)}.cap{margin:0 0 10px;font-size:10px;letter-spacing:.11em;text-transform:uppercase;color:rgba(244,248,255,.55);font-weight:850}.note{font-size:13px;line-height:1.62;color:var(--soft)}.subtle{color:var(--muted)}.meterGrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.meter span{display:flex;justify-content:space-between;margin-bottom:7px;font-size:11px;color:var(--muted)}.meter em{font-style:normal}.meter b{color:var(--soft)}.bar{height:7px;border-radius:999px;background:rgba(255,255,255,.075);overflow:hidden;box-shadow:inset 0 1px 2px rgba(0,0,0,.22)}.bar i{display:block;height:100%;width:50%;border-radius:999px;background:linear-gradient(90deg,var(--blue),var(--green));box-shadow:0 0 20px rgba(137,216,255,.22)}.bar.rose i{background:linear-gradient(90deg,var(--gold),var(--rose));box-shadow:0 0 20px rgba(255,154,170,.18)}.tags{display:flex;gap:7px;flex-wrap:wrap}.tag{padding:6px 9px;border:1px solid var(--line);border-radius:999px;background:rgba(255,255,255,.052);font-size:11px;color:var(--soft);transition:.16s}button.tag:hover,.tag:hover{background:rgba(137,216,255,.12);border-color:rgba(137,216,255,.28);transform:translateY(-1px)}.miniList{display:grid;gap:8px}.mini{padding:10px;border:1px solid rgba(255,255,255,.082);border-radius:16px;background:rgba(255,255,255,.034);font-size:12px;line-height:1.5;color:var(--soft)}.mini b{color:#fff}.schedule{display:grid;gap:7px}.slot{display:grid;grid-template-columns:56px 1fr;gap:8px;padding:9px;border-radius:15px;background:rgba(255,255,255,.028);border:1px solid transparent;font-size:12px;color:var(--muted)}.slot.now{background:linear-gradient(135deg,rgba(137,216,255,.12),rgba(217,183,255,.07));border-color:rgba(137,216,255,.28);color:#fff;box-shadow:0 0 26px rgba(137,216,255,.08)}.rels{display:grid;gap:8px}.rel{display:grid;grid-template-columns:74px 1fr 32px;gap:8px;align-items:center;font-size:12px;color:var(--soft)}.relLine{height:7px;border-radius:999px;background:rgba(255,255,255,.075);overflow:hidden}.relLine i{display:block;height:100%;border-radius:999px;background:linear-gradient(90deg,var(--rose),var(--gold),var(--green))}.empty{border:1px dashed rgba(255,255,255,.16);border-radius:21px;background:rgba(255,255,255,.026);padding:17px;font-size:13px;line-height:1.68;color:var(--muted)}
.dock{grid-column:1/2;grid-row:3/4;min-height:0;display:flex;flex-direction:column;border:1px solid var(--line);border-radius:var(--r);background:linear-gradient(180deg,rgba(12,18,32,.84),rgba(6,9,18,.73));backdrop-filter:blur(22px);box-shadow:var(--shadow);overflow:hidden}.tabs{display:flex;gap:6px;padding:12px 12px 0;overflow:auto;scrollbar-width:none}.tabs::-webkit-scrollbar{display:none}.tab{position:relative;padding:10px 12px;border-radius:16px;background:transparent;border:1px solid transparent;color:var(--muted);font-size:12px;white-space:nowrap;transition:.16s}.tab:hover{color:var(--soft);background:rgba(255,255,255,.045)}.tab.active{background:rgba(137,216,255,.12);border-color:rgba(137,216,255,.25);color:#fff}.tab.active::after{content:"";position:absolute;left:14px;right:14px;bottom:4px;height:2px;border-radius:999px;background:linear-gradient(90deg,var(--blue),var(--violet))}.panel{display:none;min-height:0;overflow:auto;padding:12px 13px 14px;scrollbar-gutter:stable}.panel.active{display:block}.timeline{display:grid;gap:8px}.event{position:relative;display:grid;grid-template-columns:64px 1fr auto;gap:10px;align-items:start;padding:11px 12px;border:1px solid var(--line);border-radius:17px;background:linear-gradient(180deg,rgba(255,255,255,.052),rgba(255,255,255,.028));box-shadow:inset 0 1px 0 rgba(255,255,255,.05)}.event::before{content:"";position:absolute;left:0;top:12px;bottom:12px;width:3px;border-radius:999px;background:linear-gradient(var(--blue),var(--violet));opacity:.65}.event .time{font-size:11px;color:var(--muted)}.event .text{font-size:13px;line-height:1.48;color:var(--soft)}.event .kind{font-size:10px;padding:4px 7px;border-radius:999px;background:rgba(255,255,255,.07);color:var(--muted);white-space:nowrap}.chat{display:grid;grid-template-columns:76px 1fr auto;gap:10px;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.07)}.chat b{font-size:12px;color:#fff}.chat p{margin:0;font-size:13px;color:var(--soft);line-height:1.5}.chat span{font-size:11px;color:var(--muted)}.grid2{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}.grid3{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px}.tile{position:relative;padding:13px;border:1px solid var(--line);border-radius:19px;background:linear-gradient(180deg,rgba(255,255,255,.058),rgba(255,255,255,.03));text-align:left;color:inherit;box-shadow:inset 0 1px 0 rgba(255,255,255,.055);transition:transform .16s ease,border-color .16s ease,background .16s ease}.tile:hover{transform:translateY(-2px);border-color:rgba(137,216,255,.25);background:linear-gradient(180deg,rgba(137,216,255,.075),rgba(255,255,255,.036))}.tile h4{margin:0 0 6px;font-size:13px;letter-spacing:-.015em}.tile p{margin:0 0 10px;font-size:12px;color:var(--muted);line-height:1.55}.tile small{color:var(--muted)}.newsHead{display:flex;justify-content:space-between;gap:8px;align-items:flex-start}.pill{padding:4px 7px;border-radius:999px;background:rgba(255,255,255,.07);border:1px solid var(--line);font-size:10px;color:var(--muted)}.ok{color:var(--green);border-color:rgba(168,243,189,.24);background:rgba(168,243,189,.08)}.bad{color:var(--rose);border-color:rgba(255,154,170,.24);background:rgba(255,154,170,.08)}.artifact b,.engine b{display:block;font-size:13px;margin-bottom:6px}.artifact p,.engine p{margin:0;color:var(--muted);font-size:12px;line-height:1.55}.progressLabel{display:flex;justify-content:space-between;gap:10px;font-size:11px;color:var(--muted);margin-top:8px}
.inspectBody::-webkit-scrollbar,.panel::-webkit-scrollbar{width:10px}.inspectBody::-webkit-scrollbar-track,.panel::-webkit-scrollbar-track{background:transparent}.inspectBody::-webkit-scrollbar-thumb,.panel::-webkit-scrollbar-thumb{background:rgba(255,255,255,.11);border:3px solid transparent;background-clip:content-box;border-radius:999px}.inspectBody::-webkit-scrollbar-thumb:hover,.panel::-webkit-scrollbar-thumb:hover{background:rgba(137,216,255,.24);border:3px solid transparent;background-clip:content-box}
@media(max-width:1180px){
  body{overflow:auto}
  #app{height:auto;min-height:100vh;grid-template-columns:1fr;grid-template-rows:auto minmax(520px,68vh) minmax(260px,34vh) auto}
  .top{grid-column:1;grid-template-columns:1fr;gap:10px;padding:14px}
  .worldCard{grid-column:1;grid-row:2}
  .dock{grid-column:1;grid-row:3}
  .inspect{grid-column:1;grid-row:4}
  .legend{display:none}
  .grid3{grid-template-columns:repeat(2,minmax(0,1fr))}
  .stats,.controls{justify-content:flex-start;flex-wrap:nowrap;overflow-x:auto;scrollbar-width:none;padding-bottom:2px}
  .stats::-webkit-scrollbar,.controls::-webkit-scrollbar{display:none}
}
@media(max-width:720px){
  #app{padding:10px;gap:10px;grid-template-rows:auto minmax(430px,60vh) minmax(250px,30vh) auto}
  .top{border-radius:22px;padding:12px}
  .brand{gap:10px}
  .brand h1{font-size:18px}
  .brand p{white-space:normal;font-size:11px;line-height:1.45}
  .mark{width:42px;height:42px;border-radius:15px;font-size:18px}
  .stats{gap:7px}
  .controls{gap:8px}
  .btn{padding:8px 12px;border-radius:14px;font-size:12px;min-width:max-content}
  .worldCard{min-height:430px}
  .hud{left:12px;top:12px;right:12px;gap:6px}
  .chip{padding:7px 10px;font-size:11px}
  .seedBox{grid-template-columns:minmax(0,1fr) auto auto;left:12px;right:12px;bottom:12px;padding:6px 6px 6px 10px;border-radius:18px;gap:6px}
  .seedBox input{padding:8px 4px;font-size:12px}
  .seedBox button{width:auto;padding:9px 10px;font-size:11px;white-space:nowrap}
  .meterGrid,.grid2,.grid3{grid-template-columns:1fr}
  .dock,.inspect{min-height:300px;border-radius:22px}
  .tabs{padding:10px 10px 0;gap:5px}
  .tab{padding:9px 11px;font-size:12px;border-radius:14px}
  .panel{padding:10px 11px 12px}
  .event{grid-template-columns:50px 1fr;padding:10px 11px}
  .event .kind{display:none}
  .chat{grid-template-columns:62px 1fr}
  .chat span{display:none}
  .card{border-radius:18px;padding:12px}
  .profile{align-items:flex-start}
  .profile h3{font-size:19px}
  .stat{min-width:72px}
  .legend{display:none}
}

</style>
</head>
<body>
<div id="app">
  <header class="top">
    <div class="brand"><div class="mark">✦</div><div><h1>AI 마을</h1><p>주민이 걷고, 소식이 퍼지고, 작은 기술이 쌓이는 연구형 마을 시뮬레이션</p></div></div>
    <div class="stats" id="stats"></div>
    <div class="controls"><button class="btn primary" id="pauseBtn">멈춤</button><button class="btn" id="stepBtn">한 걸음</button><button class="btn" id="speedBtn">속도 1x</button><button class="btn warn" id="saveBtn">저장</button><button class="btn" id="resetBtn">새 마을</button></div>
  </header>

  <section class="worldCard">
    <canvas id="world"></canvas>
    <div class="hud"><div class="chip">시간 <b id="clock">1일 07:00</b></div><div class="chip">마을 <b id="scene">아침 정리</b></div><div class="chip">입력 <b id="inputState">0</b></div></div>
    <div class="legend">주민을 누르면 기억과 관계가 보여. 소식은 대화로 퍼지고, 발전은 건물과 산출물에 남아.</div>
    <div class="toast" id="toast"></div>
    <form class="seedBox" id="seedForm"><input id="seedText" autocomplete="off" placeholder="마을에 목표나 소식을 넣기 — 예: 주말 별빛 축제를 광장에서 열자"><button type="submit">전하기</button><button type="button" class="secondary" id="eventBtn">사건 던지기</button></form>
  </section>

  <aside class="inspect">
    <div class="inspectHead"><div><h2 id="sideTitle">마을 전체</h2><p id="sideSub">오늘의 맥박과 선택한 대상의 이야기가 여기에 정리돼.</p></div><div class="badge" id="sideBadge">관찰 중</div></div>
    <div class="inspectBody" id="sideBody"></div>
  </aside>

  <section class="dock">
    <div class="tabs"><button class="tab active" data-tab="life">일대기</button><button class="tab" data-tab="talk">대화</button><button class="tab" data-tab="news">소식지도</button><button class="tab" data-tab="dev">발전·기술</button><button class="tab" data-tab="work">산출물</button><button class="tab" data-tab="research">연구 대응표</button></div>
    <div class="panel active" id="panel-life"><div class="timeline" id="lifeLog"></div></div>
    <div class="panel" id="panel-talk"><div id="talkLog"></div></div>
    <div class="panel" id="panel-news"><div class="grid2" id="newsList"></div></div>
    <div class="panel" id="panel-dev"><div class="grid3" id="devList"></div></div>
    <div class="panel" id="panel-work"><div class="grid2" id="workList"></div></div>
    <div class="panel" id="panel-research"><div class="grid2" id="researchList"></div></div>
  </section>
</div>
<script>
(()=>{
'use strict';
const $=s=>document.querySelector(s), $$=s=>[...document.querySelectorAll(s)];
const cvs=$('#world'), ctx=cvs.getContext('2d');
let W=0,H=0,DPR=1,last=0,acc=0,uiTimer=0,paused=false,speed=1,selected=null,hover=null;
const bubbleRects=new Map();
let seed=260630, memSeq=1, newsSeq=1, artifactSeq=1, inputSeq=1;
const world={w:1120,h:700};

}

  {title:'AI Village · 혼선 전파',body:'확인되지 않은 말도 퍼질 수 있다. 확신이 낮은 주민은 관측대로 이동해 근거를 붙이려 하고, 확인되면 혼선이 내려간다.'},
  {title:'Voyager · 기술 서랍',body:'완성된 프로젝트는 다음 행동에 쓰이는 작은 기술로 남는다. 마을발전기 코어가 켜지면 반복 작업 효율이 오른다.'},
  {title:'The Sims · 광고하는 건물',body:'건물이 "여기서 할 수 있는 일과 효용"을 광고하고, 주민은 자기 욕구·역할과 곱해 점수만 계산한다. 주민 패널의 행동 점수표가 그 계산을 그대로 보여준다.'},
  {title:'Tracery · 문법 대화',body:'대화와 사건 문장은 고정 문장이 아니라 치환 문법에서 매번 조합되고, 받침에 따라 조사(이/가, 은/는)가 맞춰진다.'},
  {title:'Veloren rtsim · 따라잡기',body:'탭이 닫혀 있던 시간은 이동·대화 같은 고해상도 연출을 건너뛰고 진척·소식·관계만 저해상도 규칙으로 흘러, 다시 열면 마을이 그만큼 살아 있다.'},
  {title:'Dwarf Fortress · 기억→성격',body:'기억이 묶여 영구층으로 내려가는 순간 성격 축(낙관·신중·사교·끈기)이 반드시 이동하고, 바뀐 성격은 광고 점수·대화·작업 확률에 되먹임된다.'},
  {title:'단일 파일의 선',body:'실제 LLM 호출, 벡터 DB, 서버 작업 큐, 컴퓨터 화면 조작은 없다. 대신 구조의 움직임을 브라우저 규칙으로 압축했다.'}
]}
function bindPick(){$$('[data-pick]').forEach(el=>el.onclick=()=>{selected=el.dataset.pick;updateUI()})}
function canvasPick(e){const r=cvs.getBoundingClientRect(),x=(e.clientX-r.left)/W*world.w,y=(e.clientY-r.top)/H*world.h;let hit=null;for(const a of agents){if(Math.hypot(x-a.x,y-a.y)<30)hit=a.id}if(!hit)for(const b of buildings){if(Math.abs(x-b.x)<b.w/2&&Math.abs(y-b.y)<b.h/2)hit=b.id}selected=hit;updateUI()}
function canvasHover(e){const r=cvs.getBoundingClientRect(),x=(e.clientX-r.left)/W*world.w,y=(e.clientY-r.top)/H*world.h;let hit=null;for(const a of agents){if(Math.hypot(x-a.x,y-a.y)<30)hit=a.id}if(!hit)for(const b of buildings){if(Math.abs(x-b.x)<b.w/2&&Math.abs(y-b.y)<b.h/2)hit=b.id}hover=hit;cvs.style.cursor=hit?'pointer':'default'}
// ── Veloren rtsim식 따라잡기: 탭이 닫혀 있던 시간을 저해상도 규칙으로 메꾼다 (docs/research/veloren-rtsim.md)
//    고해상도(sim: 이동·대화·거품)와 분리된 코스 규칙만 사용 — 사건·자원·소식·진척만 추상적으로 굴린다 ──
const SIM_HOURS_PER_REAL_SEC=.18, CATCHUP_CAP_HOURS=72, CATCHUP_MIN_MS=5000;
function coarseStep(h,report){
  state.hour+=h; if(state.hour>=24){daily();report.days++}
  const daylight=state.hour>=7.5&&state.hour<20;
  agents.forEach(a=>{
    if(!a.plan.length)buildPlan(a);
    if(daylight){a.energy=clamp(a.energy-h*1.3,16,100);a.focus=clamp(a.focus-h*.6,10,100)}
    else{a.energy=clamp(a.energy+h*3,0,100);a.mood=clamp(a.mood+h*.3,0,100)}
    const slot=currentSlot(a), b=slot&&building(slot.place);
    if(b){a.place=slot.place;a.x=b.x-b.w*.3+rnd()*b.w*.6;a.y=b.y-b.h*.28+rnd()*b.h*.56;a.tx=a.x;a.ty=a.y;a.task=slot.label;a.op=null;a.pathTrail=[]}
  });
  if(daylight){
    const pr=pick(projects.filter(p=>!p.done));
    if(pr&&rnd()<.5){
      const gain=2+rnd()*4; pr.p=clamp(pr.p+gain,0,100); report.progress+=gain;
      state.resources[pr.need]=clamp((state.resources[pr.need]||0)+.3,0,100);
      if(pr.p>=100){const a=agents.find(x=>x.baseTags.includes(pr.need))||pick(agents);completeProject(pr,a,building(pr.place));report.completed.push(pr.name)}
    }
    state.news.filter(n=>!n.verified).forEach(n=>{
      if(rnd()<.3){const holder=agents.find(a=>a.known[n.id]), un=agents.filter(a=>!a.known[n.id]);
        if(holder&&un.length){giveNews(pick(un),n,holder,holder.known[n.id].confidence-4+rnd()*8);report.spread++}}
      if(rnd()<.05+(hasSkill('근거 확인')?.05:0)){n.verified=true;n.confidence=clamp(n.confidence+20,0,96);state.resources.혼선=clamp(state.resources.혼선-6,0,100);state.resources.신뢰=clamp(state.resources.신뢰+2,0,100);report.verified.push(n.text)}
    });
    if(rnd()<.4){const a=pick(agents),b=pick(agents);if(a!==b){const d=rnd()<.7?1:-1;a.rel[b.id]=clamp(a.rel[b.id]+d,0,100);b.rel[a.id]=clamp(b.rel[a.id]+d,0,100);report.social++}}
  }
  state.resources.활기=clamp(state.resources.활기-.05*h,0,100); state.resources.혼선=clamp(state.resources.혼선-.06*h,0,100);
}
function catchUp(elapsedMs){
  const hours=Math.min(CATCHUP_CAP_HOURS,elapsedMs/1000*SIM_HOURS_PER_REAL_SEC);
  if(elapsedMs<CATCHUP_MIN_MS||hours<1)return;
  const report={days:0,progress:0,spread:0,social:0,completed:[],verified:[]};
  for(let t=0;t<hours;t+=.5)coarseStep(.5,report);
  state.scene=sceneText();
  const closedText=elapsedMs>3600000?`${Math.round(elapsedMs/3600000)}시간`:`${Math.max(1,Math.round(elapsedMs/60000))}분`;
  const capped=elapsedMs/1000*SIM_HOURS_PER_REAL_SEC>CATCHUP_CAP_HOURS;
  let text=`탭이 닫혀 있던 ${closedText} 동안 마을 시간 ${Math.round(hours)}시간이 저해상도로 흘렀다${capped?' (사흘치에서 멈춤)':''} — 프로젝트 +${Math.round(report.progress)}, 소식 전달 ${report.spread}회, 관계 표류 ${report.social}회.`;
  if(report.completed.length)text+=` 그 사이 ${report.completed.join(', ')}이 완성됐다.`;
  if(report.verified.length)text+=` “${report.verified[0].slice(0,24)}…”은 확인됐다.`;
  addLife(text,'따라잡기'); addRecentOp(`따라잡기 ${Math.round(hours)}시간 (코스 스텝 ${Math.ceil(hours/.5)}회)`);
  toast(`닫힌 시간 ${Math.round(hours)}시간을 따라잡았어`);
}
function save(silent){localStorage.setItem('ai-village-polished-research',JSON.stringify({state,agents,buildings,projects,skills,seed,memSeq,newsSeq,artifactSeq,inputSeq,savedAt:Date.now()}));if(silent!==true)toast('저장했어')}
function load(){try{const raw=localStorage.getItem('ai-village-polished-research');if(!raw)return false;const d=JSON.parse(raw);Object.assign(state,d.state);d.agents.forEach((a,i)=>Object.assign(agents[i],a));d.buildings.forEach((b,i)=>Object.assign(buildings[i],b));d.projects.forEach((p,i)=>Object.assign(projects[i],p));skills.splice(0,skills.length,...d.skills);seed=d.seed||seed;memSeq=d.memSeq||memSeq;newsSeq=d.newsSeq||newsSeq;artifactSeq=d.artifactSeq||artifactSeq;inputSeq=d.inputSeq||inputSeq;agents.forEach(a=>{if(!a.pers)a.pers=basePers(a.role);if(!a.persLog)a.persLog=[]});return {savedAt:d.savedAt||0}}catch(e){console.warn(e);return false}}
function reset(){localStorage.removeItem('ai-village-polished-research');location.reload()}
function sampleIncident(){return gen('사건')}
function loop(t){const dt=Math.min(.08,(t-last)/1000||0);last=t;if(!paused){acc+=dt;while(acc>.05){sim(.05);acc-=.05}}render();uiTimer+=dt;if(uiTimer>.55){updateUI();uiTimer=0}requestAnimationFrame(loop)}
function init(){
  const loaded=load();
  if(loaded&&loaded.savedAt)catchUp(Date.now()-loaded.savedAt);
  if(!loaded){
    agents.forEach(a=>{memory(a,`${a.name}은 ${a.role}로서 ${building(a.home).name}을 주 무대로 삼는다.`,[a.home,a.role,'정체성'],7,'기본',{},false);memory(a,`첫날 아침, ${a.name}은 광장에 켜지는 불빛을 보며 마을의 리듬을 익혔다.`,['마을','아침'],4,'관찰',{},false);buildPlan(a)});
    createNews('주말에 별빛 광장에서 작은 축제를 열자는 제안이 생겼다','초기 기억',[agents[1],agents[6]]);
    createNews('마을발전기 코어를 완성하면 반복 작업이 줄어들 수 있다','초기 기억',[agents[2],agents[0]]);
    addLife('AI 마을의 첫 아침이 열렸다. 주민들은 각자의 기억과 역할을 품고 움직이기 시작했다.','시작'); addTalk('챗사서','오늘은 대화가 끝나면 짧게 남겨둘게. 그래야 내일의 내가 덜 헤매니까.');
  }
  cvs.addEventListener('click',canvasPick); cvs.addEventListener('mousemove',canvasHover); cvs.addEventListener('mouseleave',()=>{hover=null;cvs.style.cursor='default'});
  $('#seedForm').addEventListener('submit',e=>{e.preventDefault();const v=$('#seedText').value.trim();if(v)submitInput(v,'seed')}); $('#eventBtn').onclick=()=>submitInput(sampleIncident(),'incident');
  $('#pauseBtn').onclick=()=>{paused=!paused;$('#pauseBtn').textContent=paused?'다시 흐르게':'멈춤'}; $('#stepBtn').onclick=()=>{sim(.9);updateUI()}; $('#speedBtn').onclick=()=>{speed=speed===1?2:speed===2?4:1;$('#speedBtn').textContent=`속도 ${speed}x`}; $('#saveBtn').onclick=()=>save(); $('#resetBtn').onclick=reset;
  document.addEventListener('visibilitychange',()=>{if(document.visibilityState==='hidden')save(true)}); window.addEventListener('beforeunload',()=>save(true)); setInterval(()=>save(true),30000);
  $$('.tab').forEach(tab=>tab.onclick=()=>{$$('.tab').forEach(t=>t.classList.remove('active'));$$('.panel').forEach(p=>p.classList.remove('active'));tab.classList.add('active');$('#panel-'+tab.dataset.tab).classList.add('active')});
  updateUI(); requestAnimationFrame(loop);
}
init();
})();
</script>
