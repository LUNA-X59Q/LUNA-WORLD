<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>AI BOX</title>
<meta name="theme-color" content="#10182b" />
<link rel="manifest" href="manifest.webmanifest" />
<link rel="icon" href="favicon.svg" type="image/svg+xml" />
<link rel="apple-touch-icon" href="apple-touch-icon.png" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="AI BOX" />
<style>
:root{
  color-scheme:dark;
  --bg:#060814;
  --surface:rgba(12,18,32,.8);
  --card:linear-gradient(180deg,rgba(255,255,255,.06),rgba(255,255,255,.03));
  --ink:#f4f8ff;
  --soft:#d9e4f5;
  --muted:#91a0b8;
  --line:rgba(255,255,255,.115);
  --line2:rgba(255,255,255,.18);
  --blue:#89d8ff;
  --violet:#d9b7ff;
  --shadow:0 20px 70px rgba(0,0,0,.4);
  --topbar:rgba(6,8,20,.86);
  --optbg:#10182b;
  --r:18px;
}
/* ── 화이트(라이트) 모드 — 깔끔한 중립 회색 배경 + 흰 카드(은은한 그림자) ── */
:root[data-theme="light"]{
  color-scheme:light;
  --bg:#ffffff;
  --surface:#ffffff;
  --card:#ffffff;
  --ink:#1c2333;
  --soft:#3a4358;
  --muted:#6b7484;
  --line:rgba(20,28,54,.10);
  --line2:rgba(20,28,54,.16);
  --blue:#1e73c8;
  --violet:#7b4fd0;
  --shadow:0 24px 70px rgba(30,40,90,.16);
  --topbar:rgba(255,255,255,.9);
  --optbg:#ffffff;
}
/* 화이트 모드 목록: 카드 대신 구분선 — 탭 피드백만 은은하게 */
:root[data-theme="light"] .post:active{background:#f4f6fa}
:root[data-theme="light"] .refreshBtn{background:#fff;box-shadow:0 2px 8px rgba(30,40,80,.06)}
:root[data-theme="light"] .refreshBtn:hover{background:#f4f5fa}
:root[data-theme="light"] dialog select,:root[data-theme="light"] dialog input,:root[data-theme="light"] dialog textarea{background:#f6f7fb}
:root[data-theme="light"] .actions button{background:#f4f5fa}
*{box-sizing:border-box}
html,body{margin:0}
body{min-height:100vh}
html{background:var(--bg)}
body{
  color:var(--ink);
  font-family:ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",sans-serif;
  background:var(--bg); /* 단색 배경 */
}
button,input,textarea,select{font:inherit;color:inherit}
button{border:0;background:none;cursor:pointer}
button:focus-visible,input:focus-visible,textarea:focus-visible,select:focus-visible{outline:2px solid rgba(137,216,255,.72);outline-offset:2px}

/* ── 상단 바 + 탭 ── */
.topbar{position:sticky;top:0;z-index:10;background:var(--topbar);backdrop-filter:blur(18px)}
header{max-width:760px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:12px;padding:14px 16px 9px}
.brand{display:flex;align-items:center;gap:11px}
.mark{width:40px;height:40px;border-radius:13px;display:block;box-shadow:0 0 36px rgba(137,216,255,.2),inset 0 0 0 1px rgba(255,255,255,.5)}
.brand h1{margin:0;font-size:21px;letter-spacing:-.03em}
.headBtns{display:flex;align-items:center;gap:8px}
.refreshBtn{width:38px;height:38px;border-radius:999px;font-size:16px;display:grid;place-items:center;color:var(--soft);border:1px solid var(--line);background:rgba(255,255,255,.04);transition:.16s}
.refreshBtn:hover{background:rgba(255,255,255,.09)}
.refreshBtn.spin svg{animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.tabs{max-width:760px;margin:0 auto;display:flex;overflow-x:auto;scrollbar-width:none;border-top:1px solid var(--line);border-bottom:1px solid var(--line)}
.tabs::-webkit-scrollbar{display:none}
.tab{flex:1;min-width:max-content;padding:14px 14px 12px;border-bottom:2.5px solid transparent;margin-bottom:-1px;color:var(--muted);font-size:14px;white-space:nowrap;text-align:center;transition:color .16s,border-color .16s}
.tab:hover{color:var(--soft)}
.tab.on{color:var(--ink);font-weight:800;border-bottom-color:var(--blue)}

/* ── 글 목록 ── */
.wrap{max-width:760px;margin:0 auto;padding:4px 14px 70px}
/* 목록: 카드 박스 대신 줄(구분선)로 글을 나눈다. 경계는 크게(넉넉한 간격) */
.post{background:none;border:0;border-radius:0;padding:15px 6px 19px;margin-bottom:0;cursor:pointer;box-shadow:none;border-bottom:1px solid var(--line2);transition:background .14s ease}
/* 첫 글은 탭 바 아래 줄과 너무 벌어지지 않게 위 여백을 줄인다 */
.post:first-child{padding-top:5px}
.post:hover{background:rgba(255,255,255,.03)}
.post:active{background:rgba(255,255,255,.05)}
.postHead{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:7px}
.cat{font-size:11px;padding:3px 9px;border-radius:999px;background:rgba(137,216,255,.16);border:1px solid rgba(137,216,255,.32);color:var(--blue);white-space:nowrap}
.src{font-size:11px;padding:3px 9px;border-radius:999px;background:rgba(217,183,255,.14);border:1px solid rgba(217,183,255,.34);color:var(--violet);white-space:nowrap}
.src.src-dr{background:rgba(129,236,178,.13);border-color:rgba(129,236,178,.34);color:#8fecb2}
.postMeta{font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.postTitle{font-size:16.5px;font-weight:700;letter-spacing:-.015em;margin-bottom:0;word-break:break-word}
.empty{padding:110px 20px;text-align:center;font-size:15px;color:var(--soft)}

/* ── 글 상세 ── */
.detail{display:none;position:fixed;inset:0;z-index:100;background:var(--bg);flex-direction:column}
.detail.open{display:flex}
.detailHead{display:flex;align-items:center;gap:6px;padding:12px 14px;border-bottom:1px solid var(--line);background:var(--topbar);backdrop-filter:blur(18px)}
.backBtn{width:38px;height:38px;border-radius:12px;font-size:21px;display:grid;place-items:center;color:var(--soft);transition:.14s}
.backBtn:hover{background:rgba(255,255,255,.07)}
.detailHead h2{flex:1;margin:0;font-size:16px;letter-spacing:-.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.delBtn{width:38px;height:38px;border-radius:12px;font-size:16px;display:grid;place-items:center;color:var(--muted);transition:.14s}
.delBtn:hover{background:rgba(255,154,170,.14);color:#ff9aaa}
.detailBody{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.detailInner{max-width:760px;margin:0 auto;padding:18px 16px 16px}
.detailTitle{font-size:19px;font-weight:800;letter-spacing:-.02em;margin:12px 0 8px;word-break:break-word}
.detailMeta{font-size:12px;color:var(--muted);margin-bottom:14px;display:flex;gap:10px;flex-wrap:wrap}
.detailContent{font-size:15px;line-height:1.65;color:var(--soft);white-space:pre-wrap;word-break:break-word;padding:16px;background:var(--card);border:1px solid var(--line);border-radius:var(--r)}
/* 본문 문단: 빈 줄(pre-wrap)이 아니라 작은 margin으로 구분 → 문단 사이 여백을 알맞게 */
.detailContent.rich{white-space:normal}
.detailContent.rich p{margin:0 0 .72em}
.detailContent.rich p:last-child{margin-bottom:0}
.detailImg{max-width:100%;height:auto;border-radius:12px;display:block;margin:6px 0}
.detailContent .detailImg{margin:10px 0}
/* 사진 카드: 기본은 화면 폭에 맞춰 전체를 보여준다(세로 비율 유지). 탭하면 원본 크기로 확대. */
.detailPhoto{padding:0;overflow:hidden;cursor:zoom-in}
.detailPhoto .detailImg{max-width:100%;height:auto;margin:0;border-radius:var(--r);cursor:zoom-in}

/* 원본 보기(라이트박스): 사진을 탭하면 원본 사진 전체를 화면에 꽉 차게 보여준다. */
.lightbox{display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.94)}
.lightbox.open{display:block}
.lbScroll{position:absolute;inset:0;overflow:hidden;display:flex;align-items:center;justify-content:center;padding:10px}
.lbScroll img{display:block;max-width:100%;max-height:100%;width:auto;height:auto} /* 전체가 보이게 화면에 맞춤 */
.lbClose{position:fixed;top:calc(env(safe-area-inset-top,0px) + 10px);right:12px;z-index:210;width:42px;height:42px;border-radius:50%;font-size:20px;display:grid;place-items:center;color:#fff;background:rgba(0,0,0,.5);border:1px solid rgba(255,255,255,.3)}

/* ── 글쓰기 모달 ── */
dialog{border:1px solid var(--line2);border-radius:20px;background:var(--surface);color:var(--ink);padding:0;width:min(480px,calc(100vw - 32px));box-shadow:var(--shadow)}
dialog::backdrop{background:rgba(3,5,10,.6);backdrop-filter:blur(4px)}
dialog form{display:grid;gap:10px;padding:20px}
dialog h2{margin:0 0 4px;font-size:17px;letter-spacing:-.02em}
dialog .hint{margin:0;font-size:12px;line-height:1.55;color:var(--muted)}
dialog .hint b{color:var(--soft);font-weight:700}
dialog input.masked{-webkit-text-security:disc;text-security:disc} /* 비밀번호 타입 없이 값 가리기 → 오토필/열쇠 아이콘 방지 */
dialog .sgroup{display:grid;gap:8px;padding:12px;border:1px solid var(--line);border-radius:14px;background:rgba(255,255,255,.02)}
dialog .sgroup h3{margin:0;font-size:13px;color:var(--soft);letter-spacing:-.01em}
#driveFilesWrap{display:grid;gap:8px}
dialog select,dialog input,dialog textarea{border:1px solid var(--line);border-radius:13px;background:rgba(255,255,255,.05);padding:11px 12px;font-size:14px;outline:none}
dialog select:focus,dialog input:focus,dialog textarea:focus{border-color:rgba(137,216,255,.5)}
dialog select option{background:var(--optbg)}
dialog textarea{min-height:130px;resize:vertical;line-height:1.5}
.actions{display:flex;gap:8px;margin-top:4px}
.actions button{flex:1;padding:11px;border-radius:13px;font-size:13px;font-weight:700;border:1px solid var(--line);background:rgba(255,255,255,.05)}
.actions button.primary{border-color:rgba(137,216,255,.34);background:linear-gradient(135deg,rgba(137,216,255,.22),rgba(217,183,255,.15))}

@media(max-width:560px){
  .brand h1{font-size:19px}
  .mark{width:37px;height:37px;border-radius:12px;font-size:13px}
  .tab{font-size:13px;padding:13px 12px 11px}
}
</style>
</head>
<body>
<div class="topbar">
  <header>
    <div class="brand"><img class="mark" src="favicon.svg" alt="AI BOX 로고"><h1>AI BOX</h1></div>
    <div class="headBtns">
      <button class="refreshBtn" id="themeBtn" aria-label="화면 모드 전환" title="화이트/다크 모드 전환"><span id="themeIcon" style="font-size:18px;line-height:1">🌗</span></button>
      <button class="refreshBtn" id="settingsBtn" aria-label="설정" title="설정 (GitHub 토큰)"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></button>
      <button class="refreshBtn" id="refreshBtn" aria-label="새로고침" title="글 새로고침"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-2.64-6.36"/><polyline points="21 3 21 9 15 9"/></svg></button>
    </div>
  </header>
  <nav class="tabs" id="tabs"></nav>
</div>
<div class="wrap"><main id="posts"></main></div>

<div class="detail" id="detail">
  <div class="detailHead">
    <button class="backBtn" id="detailBack" aria-label="뒤로">←</button>
    <h2 id="detailHeadTitle">게시글</h2>
    <button class="delBtn" id="detailDel" aria-label="삭제">🗑</button>
  </div>
  <div class="detailBody"><div class="detailInner" id="detailInner"></div></div>
</div>

<div class="lightbox" id="lightbox">
  <button class="lbClose" id="lbClose" aria-label="닫기">✕</button>
  <div class="lbScroll" id="lbScroll"><img id="lbImg" alt=""></div>
</div>

<dialog id="settingsDialog">
  <form method="dialog" id="settingsForm" autocomplete="off">
    <h2>⚙️ 설정</h2>
    <p class="hint">입력값은 이 기기에만 저장됩니다.</p>
    <div class="sgroup">
      <h3>GitHub</h3>
      <input id="fToken" class="masked" type="text" placeholder="토큰 (github_pat_… / ghp_…)" autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false" inputmode="text" name="ai-box-gh" data-lpignore="true" data-1p-ignore data-form-type="other">
    </div>
    <div class="sgroup">
      <h3>구글 드라이브</h3>
      <input id="fDriveKey" class="masked" type="text" placeholder="API 키 (AIza…)" autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false" inputmode="text" name="ai-box-dk" data-lpignore="true" data-1p-ignore data-form-type="other">
      <div id="driveFilesWrap"></div>
    </div>
    <div class="actions">
      <button type="button" id="tokenClearBtn">전체 삭제</button>
      <button type="submit" class="primary">저장</button>
    </div>
  </form>
</dialog>

<script>
(()=>{
'use strict';
const CATS=['자유','정보','그림프롬프트','프롬프트'];
const KEY='ai-box-cards';
// 이전 앱(AI 마을 시뮬레이션, LUNA-WORLD)의 저장 데이터는 모두 정리한다
try{
  const stale=k=>/^(ai-village|luna-world)/i.test(k);
  Object.keys(localStorage).filter(stale).forEach(k=>localStorage.removeItem(k));
}catch(e){}

const $=s=>document.querySelector(s);
const esc=s=>String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
let posts=[];
try{posts=JSON.parse(localStorage.getItem(KEY))||[]}catch(e){posts=[]}
let cat=CATS[0], curId=null;

/* ── 화면 모드(다크/화이트) — 이 기기에만 저장. 기본은 다크 ── */
const THEMEKEY='ai-box-theme';
function applyTheme(t){
  document.documentElement.dataset.theme=t;
  // 아이콘(🌗)은 모드와 상관없이 그대로 유지한다
  const meta=document.querySelector('meta[name=theme-color]');
  if(meta)meta.setAttribute('content',t==='light'?'#ffffff':'#10182b');
}
let theme='dark'; try{theme=localStorage.getItem(THEMEKEY)||'dark'}catch(e){}
applyTheme(theme);
$('#themeBtn').addEventListener('click',()=>{
  theme=theme==='light'?'dark':'light';
  try{localStorage.setItem(THEMEKEY,theme)}catch(e){}
  applyTheme(theme);
});

/* ── 외부 글 소스: 깃허브 + 구글드라이브 (같은 파서·렌더를 공유) ── */
// 깃허브: GitHub API로 posts/<카테고리>/ 폴더 안의 파일들을 읽는다(드라이브처럼 파일 단위).
// 파일 하나 = 글 하나(파일명=제목). API는 토큰만 있으면 비공개 레포도 됨. 토큰은 코드에
// 넣지 않고 설정에서 받아 이 기기의 localStorage에만 저장한다 → 레포·타인에게 노출되지 않음.
const GH_OWNER='LUNA-X59Q', GH_REPO='LUNA-WORLD', GH_BRANCH='main';
const TOKKEY='ai-box-gh-token';
const ghToken=()=>{try{return localStorage.getItem(TOKKEY)||''}catch(e){return ''}};

// 구글드라이브: API 키와 카테고리별 "폴더 ID"를 설정에서 받아 이 기기의
// localStorage에만 저장한다(깃허브 토큰과 동일 원칙). 폴더를 지정하면 그 폴더 안의
// 모든 문서를 조회한다. 폴더·문서는 "링크가 있는 모든 사용자"로 공개돼 있어야 한다.
const DKEY='ai-box-drive-key', DFOLDERS='ai-box-drive-folders';
const driveKey=()=>{try{return localStorage.getItem(DKEY)||''}catch(e){return ''}};
const driveFolders=()=>{try{return JSON.parse(localStorage.getItem(DFOLDERS))||{}}catch(e){return {}}};

// 드라이브 파일 하나 → 글 배열(최신→과거 순). 일반 파일은 그대로, 구글 문서는 텍스트로 export.
// `## ` 헤딩이 있으면 그 단위로, 없으면 파일 하나를 카드 하나로(파일명=제목, 수정일=날짜).
// 파일 안에서 아래쪽(나중에 쓴 글)이 최신이므로 reverse해 최신을 앞에 둔다.
async function driveFileToPosts(f,key){
  const mime=f.mimeType||'';
  // 사진(이미지) 파일: alt=media로 텍스트를 읽으면 바이너리가 깨진 문자열로 보인다.
  // → 텍스트 대신 이미지 카드로 만들어 그대로 표시한다(공개 파일은 API 키로 바로 로드됨).
  if(mime.startsWith('image/')){
    const src=`https://www.googleapis.com/drive/v3/files/${f.id}?alt=media&key=${encodeURIComponent(key)}`;
    const ts=Date.parse(f.modifiedTime||'')||0;
    let title=String(f.name||'').replace(/\.(png|jpe?g|gif|webp|bmp|svg|heic|heif|avif|tiff?)$/i,'');
    let date=(f.modifiedTime||'').slice(0,10);
    const m=title.match(/\((\d{4}-\d{2}-\d{2})\)\s*$/); if(m){date=m[1]; title=title.slice(0,m.index).trim()}
    return [{title:title||'(사진)',date,body:'',img:src,ts}];
  }
  const isDoc=mime==='application/vnd.google-apps.document';
  const url=isDoc
    ?`https://www.googleapis.com/drive/v3/files/${f.id}/export?mimeType=text/plain&key=${encodeURIComponent(key)}`
    :`https://www.googleapis.com/drive/v3/files/${f.id}?alt=media&key=${encodeURIComponent(key)}`;
  const r=await fetch(url,{cache:'no-store'});
  if(!r.ok)return [];
  const text=await r.text();
  const ts=Date.parse(f.modifiedTime||'')||0; // 문서 수정 시각(보조 정렬 기준)
  const parsed=parseMD(text);
  if(parsed.length)return parsed.reverse().map(p=>({...p,ts})); // 최신 글이 위로
  let title=String(f.name||'').replace(/\.(md|markdown|txt)$/i,''), date=(f.modifiedTime||'').slice(0,10);
  const m=title.match(/\((\d{4}-\d{2}-\d{2})\)\s*$/); if(m){date=m[1]; title=title.slice(0,m.index).trim()}
  return [{title:title||'(제목 없음)',date,body:text.trim(),ts}];
}

// 깃허브 파일 하나 → 글 배열(드라이브와 동일 규칙). 이미지는 이미지 카드로,
// `## ` 헤딩이 있으면 그 단위로, 없으면 파일 하나를 카드 하나로(파일명=제목).
async function ghFileToPosts(f,tok){
  const name=String(f.name||'');
  // 사진(이미지) 파일: raw URL을 그대로 이미지로 표시
  if(/\.(png|jpe?g|gif|webp|bmp|svg|heic|heif|avif|tiff?)$/i.test(name)){
    let title=name.replace(/\.[^.]+$/,''), date='';
    const m=title.match(/\((\d{4}-\d{2}-\d{2})\)\s*$/); if(m){date=m[1]; title=title.slice(0,m.index).trim()}
    return [{title:title||'(사진)',date,body:'',img:f.download_url,ts:0}];
  }
  if(!/\.(md|markdown|txt)$/i.test(name))return []; // md·txt 만 글로 취급(.gitkeep 등 무시)
  const headers={'Accept':'application/vnd.github.raw'}; // raw = 본문 바로 반환
  if(tok)headers['Authorization']='Bearer '+tok;
  const r=await fetch(`${f.url}${f.url.includes('?')?'&':'?'}t=${Date.now()}`,{cache:'no-store',headers});
  if(!r.ok)return [];
  const text=await r.text();
  const ts=Date.parse(r.headers.get('Last-Modified')||'')||0; // 파일 마지막 커밋 시각(보조 정렬)
  const parsed=parseMD(text);
  if(parsed.length)return parsed.reverse().map(p=>({...p,ts})); // 파일 안 여러 글은 아래쪽이 최신 → 위로
  let title=name.replace(/\.(md|markdown|txt)$/i,''), date='';
  const m=title.match(/\((\d{4}-\d{2}-\d{2})\)\s*$/); if(m){date=m[1]; title=title.slice(0,m.index).trim()}
  return [{title:title||'(제목 없음)',date,body:text.trim(),ts}];
}

// 소스 정의: id → 배지 라벨 · 캐시 키 · load(카테고리)→글 배열(미설정/없음이면 [], 실패면 throw로 캐시 유지)
const SOURCES=[
  {id:'gh', label:'GitHub', cacheKey:'ai-box-github-posts',
   async load(c){
     const tok=ghToken();
     const headers={'Accept':'application/vnd.github+json'};
     if(tok)headers['Authorization']='Bearer '+tok;
     // posts/<카테고리>/ 폴더 안의 파일 목록 (드라이브의 폴더 방식과 동일)
     const dir='posts/'+encodeURIComponent(c);
     const lr=await fetch(`https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/${dir}?ref=${GH_BRANCH}&t=${Date.now()}`,{cache:'no-store',headers});
     if(lr.status===404)return []; // 폴더 없음(글 없음) → 0개
     if(!lr.ok)throw 0; // 레이트리밋 등 → 캐시 유지
     const list=await lr.json();
     if(!Array.isArray(list))return []; // 폴더가 아니면(파일 단건 등) 무시
     const files=list.filter(f=>f.type==='file');
     const groups=await Promise.all(files.map(f=>ghFileToPosts(f,tok).catch(()=>[])));
     return groups.flat();
   }},
  {id:'dr', label:'Drive', cacheKey:'ai-box-drive-posts',
   async load(c){
     const key=driveKey(), folder=driveFolders()[c];
     if(!key||!folder)return []; // 키/폴더 미설정 → 0개
     const q=encodeURIComponent(`'${folder}' in parents and trashed=false`);
     const fields=encodeURIComponent('files(id,name,mimeType,modifiedTime)');
     const lr=await fetch(`https://www.googleapis.com/drive/v3/files?q=${q}&key=${encodeURIComponent(key)}&fields=${fields}&orderBy=modifiedTime%20desc&pageSize=100&t=${Date.now()}`,{cache:'no-store'});
     if(lr.status===404)return []; // 폴더 없음/비공개 → 0개
     if(!lr.ok)throw 0;
     const files=((await lr.json()).files||[]).filter(f=>f.mimeType!=='application/vnd.google-apps.folder');
     const groups=await Promise.all(files.map(f=>driveFileToPosts(f,key).catch(()=>[])));
     return groups.flat();
   }}, // googleapis는 CORS 허용이라 브라우저에서 바로 fetch 가능
];
const srcById=id=>SOURCES.find(s=>s.id===id);

// 소스별 상태: id → { posts:{카테고리→글 배열} }. 파싱된 글을 localStorage에 캐시(오프라인·실패 시 마지막 판).
const remote={};
for(const s of SOURCES){
  let posts={}; try{posts=JSON.parse(localStorage.getItem(s.cacheKey))||{}}catch(e){posts={}}
  CATS.forEach(c=>{if(!Array.isArray(posts[c]))posts[c]=[]});
  remote[s.id]={posts};
}

// "## 제목 (YYYY-MM-DD)" 헤딩 하나가 글 하나. 첫 헤딩 이전 내용과 코드 블록 안의 "## "는 무시.
function parseMD(md){
  const out=[]; let cur=null, inCode=false;
  for(const line of String(md).split(/\r?\n/)){
    if(line.trimStart().startsWith('```')){inCode=!inCode; if(cur)cur.lines.push(line); continue}
    if(!inCode&&line.startsWith('## ')){
      let title=line.slice(3).trim(), date='';
      const m=title.match(/\((\d{4}-\d{2}-\d{2})\)\s*$/);
      if(m){date=m[1]; title=title.slice(0,m.index).trim()}
      if(cur)out.push(cur);
      cur={title:title||'(제목 없음)',date,lines:[]};
      continue;
    }
    if(cur)cur.lines.push(line);
  }
  if(cur)out.push(cur);
  return out.map(p=>({title:p.title,date:p.date,body:p.lines.join('\n').trim()}));
}

// 본문 렌더: 그냥 글 형태(줄바꿈은 pre-wrap로 유지) + 굵게만. 코드블록은 지원 안 함.
// ``` 펜스 줄은 제거해 가독성만 남긴다(수천 자도 그대로 표시·스크롤).
function mdHtml(src){
  let t=String(src).replace(/\r\n?/g,'\n').replace(/^[ \t]*```.*$/gm,'').replace(/[^\S\r\n]+$/gm,'').replace(/\n{3,}/g,'\n\n').trim();
  // 이미지 마크다운 ![설명](URL) → <img>. 이스케이프 전에 NUL 자리표시자로 빼둔다(일반 텍스트엔 없음).
  const imgs=[];
  t=t.replace(/!\[([^\]]*)\]\((https?:\/\/[^\s)]+)\)/g,(_,alt,url)=>{
    imgs.push(`<img class="detailImg" src="${esc(url)}" alt="${esc(alt)}" loading="lazy">`);
    return '␀'+(imgs.length-1)+'␀';
  });
  // 빈 줄로 문단을 나눠 문단마다 <p>로 감싼다(문단 사이는 CSS margin으로 여백).
  // 문단 안의 한 줄 줄바꿈은 <br>로 그대로 유지한다.
  const html=t.split(/\n{2,}/).map(block=>{
    const inner=esc(block).replace(/\*\*([^*]+)\*\*/g,'<b>$1</b>').replace(/\n/g,'<br>');
    return '<p>'+inner+'</p>';
  }).join('');
  return html.replace(/␀(\d+)␀/g,(_,i)=>imgs[+i]);
}
// 로컬(내 기기) 글: 마크다운 없이 텍스트만 문단 <p>로 감싸 여백을 맞춘다.
const plainHtml=src=>String(src).replace(/\r\n?/g,'\n').replace(/[^\S\r\n]+$/gm,'').replace(/\n{3,}/g,'\n\n').trim().split(/\n{2,}/)
  .map(b=>'<p>'+esc(b).replace(/\n/g,'<br>')+'</p>').join('');

let fetching=false;
async function fetchRemote(){
  if(fetching)return; fetching=true;
  const btn=$('#refreshBtn'); btn.classList.add('spin');
  await Promise.all(SOURCES.flatMap(s=>CATS.map(async c=>{
    try{
      const list=await s.load(c);
      if(Array.isArray(list))remote[s.id].posts[c]=list;
    }catch(e){/* 실패(오프라인·레이트리밋 등) — 마지막 캐시 유지 */}
  })));
  for(const s of SOURCES){try{localStorage.setItem(s.cacheKey,JSON.stringify(remote[s.id].posts))}catch(e){}}
  fetching=false; btn.classList.remove('spin'); render();
}
$('#refreshBtn').addEventListener('click',fetchRemote);

function save(){localStorage.setItem(KEY,JSON.stringify(posts))}
function relTime(t){
  const diff=(Date.now()-t)/1000;
  if(diff<60)return '방금';
  if(diff<3600)return Math.floor(diff/60)+'분 전';
  if(diff<86400)return Math.floor(diff/3600)+'시간 전';
  if(diff<604800)return Math.floor(diff/86400)+'일 전';
  return new Date(t).toLocaleDateString('ko-KR');
}

/* 탭 */
const tabs=$('#tabs');
tabs.innerHTML=CATS.map(c=>`<button class="tab" data-cat="${c}">${c}</button>`).join('');
tabs.addEventListener('click',e=>{
  const b=e.target.closest('.tab'); if(!b)return;
  cat=b.dataset.cat; render();
});

/* 목록 */
function render(){
  document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('on',b.dataset.cat===cat));
  // 정렬(최신 위): 글마다 하나의 시간값으로 환산해 순수 시간순으로 섞는다.
  //  - 제목에 날짜(YYYY-MM-DD)가 있으면 그 날짜, 없으면 파일 시각(ts)을 쓴다.
  //    → 소스(깃허브/드라이브)나 날짜 유무와 무관하게 시간순. 같으면 ts, 그래도 같으면 저장순(안정).
  //  - ts: 깃허브 Last-Modified·드라이브 수정시각. data-i는 소스별 원본 인덱스를 유지(상세 조회용).
  const keyOf=p=>p.date?Date.parse(p.date+'T00:00:00Z'):(p.ts||0);
  const remoteItems=[];
  SOURCES.forEach(s=>(remote[s.id].posts[cat]||[]).forEach((p,i)=>remoteItems.push({s,p,i})));
  remoteItems.sort((a,b)=>{
    const k=keyOf(b.p)-keyOf(a.p);
    if(k)return k;
    return (b.p.ts||0)-(a.p.ts||0);
  });
  const remoteCards=remoteItems.map(({s,p,i})=>`<article class="post" data-src="${s.id}" data-i="${i}">
        <div class="postHead"><span style="display:flex;gap:6px"><span class="cat">${esc(cat)}</span><span class="src src-${s.id}">${esc(s.label)}</span></span><span class="postMeta">${esc(p.date)}</span></div>
        <div class="postTitle">${esc(p.title)}</div>
      </article>`);
  const localCards=posts.filter(p=>p.cat===cat).map(p=>`<article class="post" data-id="${p.id}">
        <div class="postHead"><span class="cat">${esc(p.cat)}</span><span class="postMeta">${relTime(p.time)}</span></div>
        <div class="postTitle">${esc(p.title)}</div>
      </article>`);
  const cards=[...remoteCards,...localCards];
  const emptyMsg=(ghToken()||driveKey())
    ?'📦 아직 게시글이 없어요.'
    :'🔒 설정(⚙)에서 GitHub 토큰이나 드라이브 키를 넣어주세요.';
  $('#posts').innerHTML=cards.length?cards.join(''):`<div class="empty">${emptyMsg}</div>`;
}
$('#posts').addEventListener('click',e=>{
  const el=e.target.closest('.post'); if(!el)return;
  if(el.dataset.src)openRemoteDetail(el.dataset.src,+el.dataset.i);
  else openDetail(el.dataset.id);
});

/* 상세 */
const detail=$('#detail');
function openDetail(id){
  const p=posts.find(x=>String(x.id)===String(id)); if(!p)return;
  curId=p.id;
  $('#detailDel').style.display='';
  $('#detailHeadTitle').textContent=p.title;
  $('#detailInner').innerHTML=
    `<span class="cat">${esc(p.cat)}</span>`+
    `<div class="detailTitle">${esc(p.title)}</div>`+
    `<div class="detailMeta"><span>${new Date(p.time).toLocaleString('ko-KR')}</span></div>`+
    (p.body?`<div class="detailContent rich">${plainHtml(p.body)}</div>`:'');
  detail.classList.add('open');
  if(!(history.state&&history.state.v==='detail'))history.pushState({v:'detail'},'');
}
// 외부 글은 원본이 레포/드라이브에 있으므로 앱에서 삭제 불가 — 삭제 버튼을 숨긴다
function openRemoteDetail(srcId,i){
  const s=srcById(srcId); if(!s)return;
  const p=(remote[srcId].posts[cat]||[])[i]; if(!p)return;
  curId=null;
  $('#detailDel').style.display='none';
  $('#detailHeadTitle').textContent=p.title;
  $('#detailInner').innerHTML=
    `<span class="cat">${esc(cat)}</span> <span class="src src-${s.id}">${esc(s.label)}</span>`+
    `<div class="detailTitle">${esc(p.title)}</div>`+
    (p.date?`<div class="detailMeta"><span>${esc(p.date)}</span></div>`:'')+
    (p.img?`<div class="detailContent detailPhoto"><img class="detailImg" src="${esc(p.img)}" alt="${esc(p.title)}"></div>`:'')+
    (p.body?`<div class="detailContent rich">${mdHtml(p.body)}</div>`:'');
  detail.classList.add('open');
  if(!(history.state&&history.state.v==='detail'))history.pushState({v:'detail'},'');
}
function closeDetail(){detail.classList.remove('open');curId=null}

/* 원본 보기(라이트박스) — 상세의 사진을 탭하면 원본 픽셀 크기로 연다 */
const lightbox=$('#lightbox'), lbImg=$('#lbImg'), lbScroll=$('#lbScroll');
function openLightbox(src){
  if(!src)return;
  lbImg.src=src; lbScroll.scrollTo(0,0);
  lightbox.classList.add('open');
  history.pushState({v:'lightbox'},'');
}
function closeLightbox(){lightbox.classList.remove('open'); lbImg.removeAttribute('src')}
$('#detailInner').addEventListener('click',e=>{
  const im=e.target.closest('.detailImg'); if(!im)return; // 상세 사진·본문 이미지 탭
  openLightbox(im.currentSrc||im.src);
});
$('#lbClose').addEventListener('click',()=>history.back());
$('#lbScroll').addEventListener('click',()=>history.back()); // 아무 곳이나 탭하면 닫힘

window.addEventListener('popstate',()=>{
  if(lightbox.classList.contains('open'))closeLightbox(); // 라이트박스 먼저 닫기
  else closeDetail();
});
$('#detailBack').addEventListener('click',()=>{
  if(history.state&&history.state.v==='detail')history.back(); else closeDetail();
});
$('#detailDel').addEventListener('click',()=>{
  if(curId==null)return;
  if(!confirm('이 글을 삭제할까요?'))return;
  posts=posts.filter(p=>p.id!==curId);
  save(); render();
  if(history.state&&history.state.v==='detail')history.back(); else closeDetail();
});

/* 설정 — GitHub 토큰 · 드라이브 키/폴더 ID (모두 이 기기에만 저장) */
const sdlg=$('#settingsDialog');
$('#driveFilesWrap').innerHTML=CATS.map((c,i)=>`<input class="fDriveFolder" data-cat="${esc(c)}" placeholder="${esc(c)} 폴더 ID" autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false" inputmode="text" name="ai-box-df${i}" data-lpignore="true" data-1p-ignore data-form-type="other">`).join('');
// 오토필/자동완성 바(열쇠·카드·지도)가 뜨지 않게: 평소엔 readonly, 만질 때만 편집 가능
document.querySelectorAll('#settingsForm input').forEach(inp=>{
  inp.readOnly=true;
  const edit=()=>{inp.readOnly=false};
  inp.addEventListener('pointerdown',edit);
  inp.addEventListener('focus',edit);
  inp.addEventListener('blur',()=>{inp.readOnly=true});
});
$('#settingsBtn').addEventListener('click',()=>{
  $('#fToken').value=ghToken();
  $('#fDriveKey').value=driveKey();
  const df=driveFolders();
  document.querySelectorAll('.fDriveFolder').forEach(inp=>inp.value=df[inp.dataset.cat]||'');
  sdlg.showModal();
});
$('#tokenClearBtn').addEventListener('click',()=>{
  try{[TOKKEY,DKEY,DFOLDERS].forEach(k=>localStorage.removeItem(k))}catch(e){}
  $('#fToken').value=''; $('#fDriveKey').value='';
  document.querySelectorAll('.fDriveFolder').forEach(inp=>inp.value='');
  sdlg.close(); fetchRemote();
});
$('#settingsForm').addEventListener('submit',()=>{
  const t=$('#fToken').value.trim(), dk=$('#fDriveKey').value.trim();
  const df={}; document.querySelectorAll('.fDriveFolder').forEach(inp=>{const v=inp.value.trim(); if(v)df[inp.dataset.cat]=v});
  try{
    t?localStorage.setItem(TOKKEY,t):localStorage.removeItem(TOKKEY);
    dk?localStorage.setItem(DKEY,dk):localStorage.removeItem(DKEY);
    Object.keys(df).length?localStorage.setItem(DFOLDERS,JSON.stringify(df)):localStorage.removeItem(DFOLDERS);
  }catch(e){}
  fetchRemote(); // 설정 반영해 즉시 다시 불러오기
});

render();
fetchRemote(); // 앱 열 때마다 외부 글(깃허브·드라이브) 자동 갱신
// 저장공간을 "영구"로 요청 → 브라우저가 용량 부족 시 자동으로 지우지 않게(설정값 보존)
if(navigator.storage&&navigator.storage.persist)navigator.storage.persist().catch(()=>{});
if('serviceWorker' in navigator&&location.protocol!=='file:'){
  // 새 서비스 워커가 제어권을 잡으면(=새 버전 배포·옛 캐시 정리) 한 번만 새로고침해
  // 이전 버전(옛 AI 마을 껍데기)이 잠깐 남아 보이던 현상을 없앤다.
  let refreshing=false;
  navigator.serviceWorker.addEventListener('controllerchange',()=>{
    if(refreshing)return; refreshing=true; location.reload();
  });
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}
})();
</script>
