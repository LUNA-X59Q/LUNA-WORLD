<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>AI 마을 — 살아 움직이는 연구형 시뮬레이션</title>
<meta name="theme-color" content="#10182b" />
<link rel="manifest" href="manifest.webmanifest" />
<link rel="icon" href="favicon.svg" type="image/svg+xml" />
<link rel="apple-touch-icon" href="apple-touch-icon.png" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="AI마을" />
<style>
:root{
  color-scheme:dark;
  --bg:#060814;
  --bg2:#0a1020;
  --surface:rgba(9,14,26,.72);
  --surface2:rgba(255,255,255,.055);
  --surface3:rgba(255,255,255,.085);
  --ink:#f4f8ff;
  --soft:#d9e4f5;
  --muted:#91a0b8;
  --line:rgba(255,255,255,.115);
  --line2:rgba(255,255,255,.18);
  --blue:#89d8ff;
  --violet:#d9b7ff;
  --gold:#ffe28a;
  --green:#a8f3bd;
  --rose:#ff9aaa;
  --cyan:#9ff4ef;
  --shadow:0 28px 90px rgba(0,0,0,.48);
  --shadow2:0 14px 44px rgba(0,0,0,.34);
  --r:28px;
}
*{box-sizing:border-box}
html,body{width:100%;height:100%;margin:0}
html{background:#10182b}
body{
  overflow:auto;
  color:var(--ink);
  font-family:ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",sans-serif;
  background:
    radial-gradient(circle at 12% -8%,rgba(137,216,255,.34),transparent 34%),
    radial-gradient(circle at 80% 0%,rgba(217,183,255,.23),transparent 31%);
  background-repeat:no-repeat;
}
body::before{
  content:"";
  position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    linear-gradient(rgba(255,255,255,.025) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,255,255,.018) 1px,transparent 1px);
  background-size:42px 42px;
  mask-image:radial-gradient(circle at 50% 30%,black,transparent 78%);
}
button,input{font:inherit} button{border:0;background:none;color:inherit;cursor:pointer} input{color:inherit}
button:focus-visible,input:focus-visible{outline:2px solid rgba(137,216,255,.72);outline-offset:2px}
#app{
  position:relative;z-index:1;width:100%;height:100%;padding:16px;
  display:grid;grid-template-columns:minmax(680px,1fr) 384px;grid-template-rows:82px auto minmax(440px,1fr) auto 276px;gap:16px;
}
.top{
  grid-column:1/3;display:grid;grid-template-columns:minmax(320px,1fr) auto auto;gap:14px;align-items:center;
  padding:13px 15px;border:1px solid var(--line);border-radius:26px;
  background:linear-gradient(180deg,rgba(255,255,255,.086),rgba(255,255,255,.038));
  backdrop-filter:blur(22px);box-shadow:var(--shadow2);position:relative;overflow:hidden;
}
.top::before{content:"";position:absolute;inset:0;border-radius:inherit;pointer-events:none;background:linear-gradient(90deg,rgba(137,216,255,.16),transparent 34%,rgba(255,226,138,.08) 70%,transparent)}
.brand{display:flex;align-items:center;gap:14px;min-width:0;position:relative}.mark{width:48px;height:48px;border-radius:18px;display:grid;place-items:center;color:#06101a;font-weight:950;font-size:20px;background:conic-gradient(from 220deg,var(--blue),var(--violet),var(--gold),var(--green),var(--blue));box-shadow:0 0 46px rgba(137,216,255,.22),inset 0 0 0 1px rgba(255,255,255,.5)}
.brand h1{margin:0;font-size:20px;letter-spacing:-.045em;line-height:1}.brand p{margin:6px 0 0;font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:680px}
.stats{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;position:relative}.stat{--v:50;position:relative;min-width:78px;padding:8px 10px 10px;border:1px solid var(--line);border-radius:17px;background:linear-gradient(180deg,rgba(255,255,255,.075),rgba(255,255,255,.035));box-shadow:inset 0 1px 0 rgba(255,255,255,.08);font-size:11px;color:var(--muted);overflow:hidden}.stat::after{content:"";position:absolute;left:9px;right:9px;bottom:5px;height:2px;border-radius:999px;background:linear-gradient(90deg,var(--blue),var(--green));transform-origin:left;transform:scaleX(calc(var(--v)/100));opacity:.85}.stat span{display:block;white-space:nowrap}.stat b{display:block;margin-top:2px;color:#fff;font-size:15px;letter-spacing:-.03em}.stat.noise::after{background:linear-gradient(90deg,var(--gold),var(--rose))}.stat.noise b{color:var(--rose)}
.controls{display:flex;gap:8px;justify-content:flex-end;position:relative}.btn{padding:10px 12px;border:1px solid var(--line);border-radius:15px;background:rgba(255,255,255,.06);font-size:12px;white-space:nowrap;box-shadow:inset 0 1px 0 rgba(255,255,255,.06);transition:transform .16s ease,background .16s ease,border-color .16s ease}.btn:hover{transform:translateY(-1px);background:rgba(255,255,255,.105);border-color:var(--line2)}.btn:active{transform:translateY(0)}.btn.primary{background:linear-gradient(135deg,rgba(137,216,255,.22),rgba(217,183,255,.15));border-color:rgba(137,216,255,.34)}.btn.warn{border-color:rgba(255,226,138,.28);background:rgba(255,226,138,.075)}
.worldCard{grid-column:1/2;grid-row:3/4;position:relative;overflow:hidden;isolation:isolate;min-height:440px;border:1px solid rgba(255,255,255,.12);border-radius:var(--r);background:#0b111b;box-shadow:var(--shadow)}
.worldCard::before{content:"";position:absolute;inset:0;z-index:2;pointer-events:none;border-radius:inherit;box-shadow:inset 0 1px 0 rgba(255,255,255,.13),inset 0 -80px 110px rgba(2,4,9,.24)}
#world{position:absolute;inset:0;width:100%;height:100%;display:block}.hud{grid-column:1/2;grid-row:2/3;display:flex;gap:8px;flex-wrap:wrap;align-items:center;min-width:0}.chip{padding:8px 11px;border:1px solid rgba(255,255,255,.14);border-radius:999px;background:rgba(5,9,16,.54);backdrop-filter:blur(18px);font-size:12px;color:var(--soft);box-shadow:0 12px 38px rgba(0,0,0,.22)}.chip b{color:#fff;margin-left:4px}.legend{position:absolute;right:16px;top:16px;z-index:5;max-width:280px;text-align:right;font-size:12px;line-height:1.56;color:rgba(244,248,255,.70);text-shadow:0 1px 9px rgba(0,0,0,.48)}
.seedBox{grid-column:1/2;grid-row:4/5;min-width:0;display:grid;grid-template-columns:1fr auto auto;gap:8px;padding:8px;border-radius:22px;border:1px solid rgba(255,255,255,.14);background:rgba(5,9,16,.68);backdrop-filter:blur(22px);box-shadow:0 20px 70px rgba(0,0,0,.32),inset 0 1px 0 rgba(255,255,255,.08)}.seedBox input{min-width:0;border:0;outline:0;background:transparent;padding:10px 9px;font-size:13px}.seedBox input::placeholder{color:rgba(217,228,245,.52)}.seedBox button{padding:10px 13px;border-radius:15px;border:1px solid rgba(137,216,255,.28);background:linear-gradient(135deg,rgba(137,216,255,.16),rgba(217,183,255,.09));font-size:12px;font-weight:700;transition:.16s}.seedBox button:hover{transform:translateY(-1px);background:rgba(137,216,255,.18)}.seedBox button.secondary{border-color:rgba(255,255,255,.14);background:rgba(255,255,255,.065);font-weight:600}
.toast{position:absolute;left:50%;top:18px;z-index:30;transform:translateX(-50%) translateY(-8px);opacity:0;transition:.24s ease;padding:10px 14px;border:1px solid rgba(137,216,255,.32);border-radius:999px;background:rgba(5,9,16,.78);backdrop-filter:blur(18px);box-shadow:var(--shadow2);font-size:12px;color:var(--soft)}.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.inspect{grid-column:2/3;grid-row:2/6;min-height:0;display:flex;flex-direction:column;border:1px solid var(--line);border-radius:var(--r);background:linear-gradient(180deg,rgba(12,18,32,.82),rgba(6,9,18,.76));backdrop-filter:blur(22px);box-shadow:var(--shadow);overflow:hidden}.inspectHead{padding:18px 18px 15px;border-bottom:1px solid var(--line);display:flex;align-items:flex-start;justify-content:space-between;gap:12px;position:relative;flex-shrink:0}.inspectHead::after{content:"";position:absolute;left:18px;right:18px;bottom:-1px;height:1px;background:linear-gradient(90deg,transparent,var(--blue),transparent);opacity:.34}.inspectHead h2{margin:0;font-size:19px;letter-spacing:-.035em}.inspectHead p{margin:6px 0 0;font-size:12px;line-height:1.55;color:var(--muted)}.badge{white-space:nowrap;padding:7px 9px;border-radius:999px;border:1px solid rgba(137,216,255,.26);background:rgba(137,216,255,.11);font-size:11px;color:var(--blue);box-shadow:0 0 28px rgba(137,216,255,.08)}
.backBtn{display:none;flex-shrink:0;width:36px;height:36px;border-radius:13px;border:1px solid var(--line);background:rgba(255,255,255,.07);font-size:17px;line-height:1;color:var(--soft);transition:.16s;place-items:center}.backBtn:hover{background:rgba(137,216,255,.14);border-color:rgba(137,216,255,.3);transform:translateX(-1px)}.inspect.hasSel .backBtn{display:grid}
.inspectBody{min-height:0;overflow:auto;padding:15px;scrollbar-gutter:stable}.profile{display:flex;gap:13px;align-items:center;margin-bottom:14px}.avatar{width:60px;height:60px;border-radius:22px;border:1px solid rgba(255,255,255,.15);display:grid;place-items:center;font-size:28px;background:linear-gradient(180deg,rgba(255,255,255,.10),rgba(255,255,255,.035));box-shadow:0 16px 46px rgba(0,0,0,.25),inset 0 1px 0 rgba(255,255,255,.10)}.profile h3{margin:0;font-size:21px;letter-spacing:-.04em}.profile p{margin:5px 0 0;font-size:12px;color:var(--muted);line-height:1.55}
.card{border:1px solid var(--line);background:linear-gradient(180deg,rgba(255,255,255,.063),rgba(255,255,255,.033));border-radius:21px;padding:13px;margin-bottom:10px;box-shadow:inset 0 1px 0 rgba(255,255,255,.055)}.card:hover{border-color:rgba(255,255,255,.16)}.cap{margin:0 0 10px;font-size:10px;letter-spacing:.11em;text-transform:uppercase;color:rgba(244,248,255,.55);font-weight:850}.note{font-size:13px;line-height:1.62;color:var(--soft)}.subtle{color:var(--muted)}.meterGrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.meter span{display:flex;justify-content:space-between;margin-bottom:7px;font-size:11px;color:var(--muted)}.meter em{font-style:normal}.meter b{color:var(--soft)}.bar{height:7px;border-radius:999px;background:rgba(255,255,255,.075);overflow:hidden;box-shadow:inset 0 1px 2px rgba(0,0,0,.22)}.bar i{display:block;height:100%;width:50%;border-radius:999px;background:linear-gradient(90deg,var(--blue),var(--green));box-shadow:0 0 20px rgba(137,216,255,.22)}.bar.rose i{background:linear-gradient(90deg,var(--gold),var(--rose));box-shadow:0 0 20px rgba(255,154,170,.18)}.tags{display:flex;gap:7px;flex-wrap:wrap}.tag{padding:6px 9px;border:1px solid var(--line);border-radius:999px;background:rgba(255,255,255,.052);font-size:11px;color:var(--soft);transition:.16s}.tag.on{background:rgba(137,216,255,.16);border-color:rgba(137,216,255,.44);color:#fff;box-shadow:0 0 18px rgba(137,216,255,.12)}.chronBar{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:11px}button.tag:hover,.tag:hover{background:rgba(137,216,255,.12);border-color:rgba(137,216,255,.28);transform:translateY(-1px)}.miniList{display:grid;gap:8px}.mini{padding:10px;border:1px solid rgba(255,255,255,.082);border-radius:16px;background:rgba(255,255,255,.034);font-size:12px;line-height:1.5;color:var(--soft)}.mini b{color:#fff}.schedule{display:grid;gap:7px}.slot{display:grid;grid-template-columns:56px 1fr;gap:8px;padding:9px;border-radius:15px;background:rgba(255,255,255,.028);border:1px solid transparent;font-size:12px;color:var(--muted)}.slot.now{background:linear-gradient(135deg,rgba(137,216,255,.12),rgba(217,183,255,.07));border-color:rgba(137,216,255,.28);color:#fff;box-shadow:0 0 26px rgba(137,216,255,.08)}.rels{display:grid;gap:8px}.rel{display:grid;grid-template-columns:74px 1fr 32px;gap:8px;align-items:center;font-size:12px;color:var(--soft)}.relLine{height:7px;border-radius:999px;background:rgba(255,255,255,.075);overflow:hidden}.relLine i{display:block;height:100%;border-radius:999px;background:linear-gradient(90deg,var(--rose),var(--gold),var(--green))}.empty{border:1px dashed rgba(255,255,255,.16);border-radius:21px;background:rgba(255,255,255,.026);padding:17px;font-size:13px;line-height:1.68;color:var(--muted)}
.dock{grid-column:1/2;grid-row:5/6;min-height:0;display:flex;flex-direction:column;border:1px solid var(--line);border-radius:var(--r);background:linear-gradient(180deg,rgba(12,18,32,.84),rgba(6,9,18,.73));backdrop-filter:blur(22px);box-shadow:var(--shadow);overflow:hidden}.tabs{display:flex;gap:6px;padding:12px 12px 0;overflow:auto;scrollbar-width:none;flex-shrink:0}.tabs::-webkit-scrollbar{display:none}.tab{position:relative;padding:10px 12px;border-radius:16px;background:transparent;border:1px solid transparent;color:var(--muted);font-size:12px;white-space:nowrap;transition:.16s}.tab:hover{color:var(--soft);background:rgba(255,255,255,.045)}.tab.active{background:rgba(137,216,255,.12);border-color:rgba(137,216,255,.25);color:#fff}.tab.active::after{content:"";position:absolute;left:14px;right:14px;bottom:4px;height:2px;border-radius:999px;background:linear-gradient(90deg,var(--blue),var(--violet))}.panel{display:none;min-height:0;overflow:auto;padding:12px 13px 14px;scrollbar-gutter:stable}.panel.active{display:block;flex:1 1 0}.timeline{display:grid;gap:8px}.event{position:relative;display:grid;grid-template-columns:64px 1fr auto;gap:10px;align-items:start;padding:11px 12px;border:1px solid var(--line);border-radius:17px;background:linear-gradient(180deg,rgba(255,255,255,.052),rgba(255,255,255,.028));box-shadow:inset 0 1px 0 rgba(255,255,255,.05)}.event::before{content:"";position:absolute;left:0;top:12px;bottom:12px;width:3px;border-radius:999px;background:linear-gradient(var(--blue),var(--violet));opacity:.65}.event .time{font-size:11px;color:var(--muted)}.event .text{font-size:13px;line-height:1.48;color:var(--soft)}.event .kind{font-size:10px;padding:4px 7px;border-radius:999px;background:rgba(255,255,255,.07);color:var(--muted);white-space:nowrap}.chat{display:grid;grid-template-columns:76px 1fr auto;gap:10px;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.07)}.chat b{font-size:12px;color:#fff}.chat p{margin:0;font-size:13px;color:var(--soft);line-height:1.5}.chat span{font-size:11px;color:var(--muted)}.grid2{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}.grid3{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px}.tile{position:relative;padding:13px;border:1px solid var(--line);border-radius:19px;background:linear-gradient(180deg,rgba(255,255,255,.058),rgba(255,255,255,.03));text-align:left;color:inherit;box-shadow:inset 0 1px 0 rgba(255,255,255,.055);transition:transform .16s ease,border-color .16s ease,background .16s ease}.tile:hover{transform:translateY(-2px);border-color:rgba(137,216,255,.25);background:linear-gradient(180deg,rgba(137,216,255,.075),rgba(255,255,255,.036))}.tile h4{margin:0 0 6px;font-size:13px;letter-spacing:-.015em}.tile p{margin:0 0 10px;font-size:12px;color:var(--muted);line-height:1.55}.tile small{color:var(--muted)}.newsHead{display:flex;justify-content:space-between;gap:8px;align-items:flex-start}.pill{padding:4px 7px;border-radius:999px;background:rgba(255,255,255,.07);border:1px solid var(--line);font-size:10px;color:var(--muted)}.ok{color:var(--green);border-color:rgba(168,243,189,.24);background:rgba(168,243,189,.08)}.bad{color:var(--rose);border-color:rgba(255,154,170,.24);background:rgba(255,154,170,.08)}.artifact b,.engine b{display:block;font-size:13px;margin-bottom:6px}.artifact p,.engine p{margin:0;color:var(--muted);font-size:12px;line-height:1.55}.progressLabel{display:flex;justify-content:space-between;gap:10px;font-size:11px;color:var(--muted);margin-top:8px}
.sideTabs{display:flex;gap:7px;margin-bottom:12px}.sideTabs .tag{flex:1;text-align:center;padding:10px 11px;font-size:12px;border-radius:14px}
.mobileTabs{display:none}
.temperWrap{position:fixed;inset:0;z-index:60;background:rgba(3,6,12,.66);backdrop-filter:blur(6px);display:grid;place-items:center;padding:16px}
.temperWrap[hidden]{display:none}
.temperCard{width:min(660px,100%);max-height:88vh;display:flex;flex-direction:column;gap:10px;padding:18px;border:1px solid var(--line2);border-radius:24px;background:linear-gradient(180deg,rgba(14,20,36,.97),rgba(8,12,24,.97));box-shadow:var(--shadow)}
.temperCard h3{margin:0;font-size:17px;letter-spacing:-.02em}
.temperCard textarea{flex:1;min-height:220px;resize:vertical;border:1px solid var(--line);border-radius:14px;background:rgba(255,255,255,.04);color:var(--ink);padding:12px;font:12.5px/1.65 ui-monospace,SFMono-Regular,Menlo,monospace;outline:none}
.temperCard textarea:focus{border-color:rgba(137,216,255,.4)}
.temperMsg{font-size:12px;line-height:1.55;color:var(--rose);white-space:pre-wrap;max-height:110px;overflow:auto}
.temperMsg.ok{color:var(--green)}
.temperBtns{display:flex;gap:8px;justify-content:flex-end}
.inspectBody::-webkit-scrollbar,.panel::-webkit-scrollbar{width:10px}.inspectBody::-webkit-scrollbar-track,.panel::-webkit-scrollbar-track{background:transparent}.inspectBody::-webkit-scrollbar-thumb,.panel::-webkit-scrollbar-thumb{background:rgba(255,255,255,.11);border:3px solid transparent;background-clip:content-box;border-radius:999px}.inspectBody::-webkit-scrollbar-thumb:hover,.panel::-webkit-scrollbar-thumb:hover{background:rgba(137,216,255,.24);border:3px solid transparent;background-clip:content-box}
@media(max-width:1180px){
  body{overflow:auto}
  #app{display:flex;flex-direction:column;height:auto;min-height:100vh}
  .top{grid-template-columns:1fr;gap:10px;padding:14px}
  /* ── 모바일 상단 탭: 화면 맨 위에 붙어 화면(마을/현황/관찰/기록)을 전환한다.
        예시처럼 불투명 배경 + 하단 경계선 + 활성 탭 밑줄로 경계를 뚜렷하게 ── */
  .mobileTabs{display:flex;gap:0;position:sticky;top:0;z-index:40;margin:-16px -16px 0;padding:2px 6px 0;background:#0b101f;border-bottom:1px solid var(--line2);box-shadow:0 8px 24px rgba(0,0,0,.35)}
  .mobileTabs button{flex:1;padding:15px 4px 13px;border-radius:0;border:0;border-bottom:2.5px solid transparent;margin-bottom:-1px;color:var(--muted);font-size:13.5px;white-space:nowrap;transition:color .16s,border-color .16s}
  .mobileTabs button.on{color:#fff;font-weight:800;border-bottom-color:var(--blue)}
  .sideTabs{display:none} /* 패널 안 탭은 상단 탭이 대신한다 */
  .worldCard{height:62vh;min-height:440px}
  .dock{height:64vh}
  #app.mv-village .inspect,#app.mv-village .dock{display:none}
  /* AI마을 헤더 카드는 '마을' 화면에서만 — 나머지 화면은 탭 바부터 시작한다 */
  #app.mv-status .top,#app.mv-status .worldCard,#app.mv-status .seedBox,#app.mv-status .dock{display:none}
  #app.mv-observe .top,#app.mv-observe .worldCard,#app.mv-observe .seedBox,#app.mv-observe .dock{display:none}
  #app.mv-records .top,#app.mv-records .worldCard,#app.mv-records .seedBox,#app.mv-records .inspect{display:none}
  #app.mv-records .dock{height:auto;min-height:0;flex:1 1 0}
  #app.mv-records .dock .panel.active{max-height:calc(100dvh - 250px)}
  .legend{display:none}
  .grid3{grid-template-columns:repeat(2,minmax(0,1fr))}
  .stats,.controls{justify-content:flex-start;flex-wrap:nowrap;overflow-x:auto;scrollbar-width:none;padding-bottom:2px}
  .stats::-webkit-scrollbar,.controls::-webkit-scrollbar{display:none}
}
@media(max-width:720px){
  #app{padding:10px;gap:10px}
  .mobileTabs{margin:-10px -10px 0}
  .top{border-radius:22px;padding:12px}
  .brand{gap:10px}
  .brand h1{font-size:18px}
  .brand p{white-space:normal;font-size:11px;line-height:1.45}
  .mark{width:42px;height:42px;border-radius:15px;font-size:18px}
  .stats{gap:7px}
  .controls{gap:8px}
  .btn{padding:8px 12px;border-radius:14px;font-size:12px;min-width:max-content}
  .worldCard{height:56vh;min-height:400px}
  .hud{gap:6px}
  .chip{padding:7px 10px;font-size:11px}
  .seedBox{grid-template-columns:minmax(0,1fr) auto auto;padding:6px 6px 6px 10px;border-radius:18px;gap:6px}
  .seedBox input{padding:8px 4px;font-size:12px}
  .seedBox button{width:auto;padding:9px 10px;font-size:11px;white-space:nowrap}
  .meterGrid,.grid2,.grid3{grid-template-columns:1fr}
  .dock,.inspect{min-height:300px;border-radius:22px}
  .tabs{padding:10px 10px 0;gap:5px}
  .tab{padding:9px 11px;font-size:12px;border-radius:14px}
  .panel{padding:10px 11px 12px}
  .event{grid-template-columns:50px 1fr;padding:10px 11px}
  .event .kind{display:none}
  .chat{grid-template-columns:62px 1fr}
  .chat span{display:none}
  .card{border-radius:18px;padding:12px}

    if(!(warm/neigh.length<.34||cold>=2)||rnd()<.5)continue; // Schelling 임계: 따뜻한 이웃 1/3 미만

const htmlCache=new WeakMap();
function setHTML(el,html){
  if(htmlCache.get(el)===html)return;
  htmlCache.set(el,html);
  const sc=el.closest('.panel,.inspectBody')||el;
  const st=sc.scrollTop, sh=sc.scrollHeight;
  el.innerHTML=html;
  if(st>4)sc.scrollTop=st+(sc.scrollHeight-sh);
}

// ── TotT drama.py식 이야기 발굴: 시뮬레이션은 원재료를 만들고, 이야기는 큐레이션이 찾아낸다 —
//    사건 로그·관계·약속·소문에서 서사 패턴을 사후 검색한다 (docs/research/talk-of-the-town.md) ──
function mineStories(){
  const S=[], ch=state.chronicle;
  const pairKind=k=>{const map={};ch.forEach(e=>{if(e.kind!==k||e.who.length<2)return;const key=e.who.slice(0,2).sort().join('|');(map[key]=map[key]||[]).push(e)});return map};
  const conf=pairKind('갈등'), heal=pairKind('화해');
  Object.entries(conf).forEach(([key,evs])=>{
    const [x,y]=key.split('|').map(id=>agents.find(a=>a.id===id)); if(!x||!y)return;
    const healed=(heal[key]||[]).length, relAvg=(x.rel[y.id]+y.rel[x.id])/2;
    if(healed&&evs.length>=2)S.push({title:`${N(x.name,'gwa')} ${y.name}, 다시 이어진 매듭`,text:`${evs.length}번 어긋난 끝에 화해가 있었다.`});
    else if(evs.length>=3&&relAvg<48)S.push({title:`${N(x.name,'gwa')} ${y.name} — 부딪히는 두 사람`,text:`${evs.length}번 어긋났고 아직 매듭이 없다. 최근: ${evs[0].text}`});
  });
  agents.forEach(a=>{
    if(a.breaches>=2)S.push({title:`${a.name}의 미뤄진 약속들`,text:`약속 ${a.breaches}건이 어그러졌다. 광장의 말이 이를 기억하고 있다.`});
    else if(a.kept>=3)S.push({title:`말한 것은 지키는 ${a.name}`,text:`약속 ${a.kept}건을 지켰다. 신뢰는 이렇게 쌓인다.`});
  });
  for(let i=0;i<agents.length;i++)for(let j=i+1;j<agents.length;j++){
    const x=agents[i],y=agents[j];
    if(x.rel[y.id]>76&&y.rel[x.id]>76)S.push({title:`${N(x.name,'gwa')} ${y.name}, 겹쳐 걷는 길`,text:`서로의 온도가 ${Math.round((x.rel[y.id]+y.rel[x.id])/2)}까지 올랐다.`});
  }
  state.news.forEach(n=>{
    if(n.path.length>=4)S.push({title:'말이 걸어간 길',text:`“${n.text.slice(0,36)}…” — ${n.path.length}번 옮겨졌고 ${n.verified?'끝내 확인됐다':'아직 확인되지 않았다'}${n.countered?'. 반박하는 목소리도 있었다':''}${n.distorted?'. 퍼지며 내용이 조금씩 바뀌고 있다':''}.`});
  });
  projects.filter(p=>(p.cycles||0)>=2).forEach(p=>S.push({title:`${p.name}, ${p.cycles}번째 손질`,text:'만드는 일과 지키는 일이 번갈아 온다. 완성은 상태가 아니라 리듬이다.'}));
  const quiet=ch.find(e=>e.kind==='행사'&&e.text.includes('조용히 끝났다')); if(quiet)S.push({title:'아무도 오지 않은 저녁',text:quiet.text});
  const taste=ch.find(e=>e.kind==='취향'); if(taste)S.push({title:'같은 것을 좋아하는 두 사람',text:taste.text});
  const lifeEv=ch.find(e=>e.kind==='생애'); if(lifeEv)S.push({title:'마을의 얼굴이 바뀐다',text:lifeEv.text});
  return S.slice(0,6);
}
let chronFilter={type:'all',id:null};
function renderChronicle(){
  const stories=mineStories();
  setHTML($('#storyList'),stories.length?stories.map(s=>`<div class="tile"><h4>${esc(s.title)}</h4><p>${esc(s.text)}</p></div>`).join(''):'<div class="empty" style="grid-column:1/-1">아직 발굴할 이야기가 없어. 갈등과 화해, 지켜지거나 어그러진 약속이 쌓이면 여기서 서사가 캐내져.</div>');
  const f=chronFilter;
  const chips=[['all','전체 '+state.chronicle.length,null]]
    .concat(agents.map(a=>['who',`${a.face} ${a.name}`,a.id]))
    .concat(buildings.map(b=>['where',`${b.icon} ${b.name}`,b.id]))
    .concat(['사건','완성','성격','생애','거처','소식','확인','약속','화해','갈등','행사','관습','따라잡기','아침'].map(k=>['kind',k,k]));
  setHTML($('#chronBar'),chips.map(([type,label,id])=>`<button class="tag ${f.type===type&&f.id===(id||null)?'on':''}" data-chron="${type}:${id||''}">${label}</button>`).join(''));
  $$('#chronBar [data-chron]').forEach(el=>el.onclick=()=>{const [type,id]=el.dataset.chron.split(':');chronFilter=(chronFilter.type===type&&chronFilter.id===(id||null))?{type:'all',id:null}:{type,id:id||null};renderChronicle()});
  const list=state.chronicle.filter(e=>f.type==='all'||(f.type==='who'&&e.who.includes(f.id))||(f.type==='where'&&e.where.includes(f.id))||(f.type==='kind'&&e.kind===f.id)).slice(0,160);
  setHTML($('#chronLog'),list.map(e=>`<div class="event"><div class="time">${e.time}</div><div class="text">${esc(e.text)}</div><div class="kind">${esc(e.kind)}</div></div>`).join('')||'<div class="empty">아직 연대기에 남을 만큼 굵직한 일이 없어. 인물·장소·종류 단추로 역사를 걸러 볼 수 있어.</div>');
}

function setSelected(id){
  if(id){
    const first=!selected; selected=id;
    if(first){try{history.pushState({sel:1},'')}catch(e){}}
    updateUI();
    if(window.innerWidth<=1180)setMview('status'); // 좁은 화면: 상세는 현황 화면에서 보여준다
  } else if(selected){
    if(history.state&&history.state.sel){try{history.back();return}catch(e){}} // popstate가 마저 지운다
    selected=null; updateUI();
  }
}

function canvasPick(e){const r=cvs.getBoundingClientRect(),x=(e.clientX-r.left)/W*world.w,y=(e.clientY-r.top)/H*world.h;let hit=null;for(const a of agents){if(Math.hypot(x-a.x,y-a.y)<30)hit=a.id}if(!hit)for(const b of buildings){if(Math.abs(x-b.x)<b.w/2&&Math.abs(y-b.y)<b.h/2)hit=b.id}if(hit)setSelected(hit);else if(selected)setSelected(null)}
function canvasHover(e){const r=cvs.getBoundingClientRect(),x=(e.clientX-r.left)/W*world.w,y=(e.clientY-r.top)/H*world.h;let hit=null;for(const a of agents){if(Math.hypot(x-a.x,y-a.y)<30)hit=a.id}if(!hit)for(const b of buildings){if(Math.abs(x-b.x)<b.w/2&&Math.abs(y-b.y)<b.h/2)hit=b.id}hover=hit;cvs.style.cursor=hit?'pointer':'default'}
// ── Veloren rtsim식 따라잡기: 탭이 닫혀 있던 시간을 저해상도 규칙으로 메꾼다 (docs/research/veloren-rtsim.md)
//    고해상도(sim: 이동·대화·거품)와 분리된 코스 규칙만 사용 — 사건·자원·소식·진척만 추상적으로 굴린다 ──
const SIM_HOURS_PER_REAL_SEC=.18, CATCHUP_CAP_HOURS=72, CATCHUP_MIN_MS=5000;
function coarseStep(h,report){
  state.hour+=h; if(state.hour>=24){daily();report.days++}
  const daylight=state.hour>=7.5&&state.hour<20;
  agents.forEach(a=>{
    if(!a.plan.length)buildPlan(a);
    if(daylight){a.energy=clamp(a.energy-h*1.3,16,100);a.focus=clamp(a.focus-h*.6,10,100)}
    else{a.energy=clamp(a.energy+h*3,0,100);a.mood=clamp(a.mood+h*.3,0,100)}
    const slot=currentSlot(a), b=slot&&building(slot.place);
    if(b){a.place=slot.place;a.x=b.x-b.w*.3+rnd()*b.w*.6;a.y=b.y-b.h*.28+rnd()*b.h*.56;a.tx=a.x;a.ty=a.y;a.task=slot.label;a.op=null;a.pathTrail=[]}
  });
  if(daylight){
    const pr=pick(projects.filter(p=>!p.done));
    if(pr&&rnd()<.5){
      const gain=2+rnd()*4; pr.p=clamp(pr.p+gain,0,100); report.progress+=gain;
      state.resources[pr.need]=clamp((state.resources[pr.need]||0)+.3,0,100);
      if(pr.p>=100){const a=agents.find(x=>x.baseTags.includes(pr.need))||pick(agents);completeProject(pr,a,building(pr.place));report.completed.push(pr.name)}
    }
    state.news.filter(n=>!n.verified).forEach(n=>{
      if(rnd()<.3){const holder=agents.find(a=>a.known[n.id]), un=agents.filter(a=>!a.known[n.id]);
        if(holder&&un.length){let told=holder.known[n.id].text||n.text; if(rnd()<.15){told=distort(told); if(told!==n.text)n.distorted=true} giveNews(pick(un),n,holder,holder.known[n.id].confidence-4+rnd()*8,told);report.spread++}}
      if(rnd()<.05+(hasSkill('근거 확인')?.05:0)){n.verified=true;n.confidence=clamp(n.confidence+20,0,96);state.resources.혼선=clamp(state.resources.혼선-6,0,100);state.resources.신뢰=clamp(state.resources.신뢰+2,0,100);report.verified.push(n.text);chron(`닫힌 시간 동안 “${n.text}” 소식이 확인됐다.`,'확인')}
    });
    if(rnd()<.4){const a=pick(agents),b=pick(agents);if(a!==b){const d=rnd()<.7?1:-1;a.rel[b.id]=clamp(a.rel[b.id]+d,0,100);b.rel[a.id]=clamp(b.rel[a.id]+d,0,100);report.social++}}
  }
  // 닫힌 시간의 약속과 모임 — 고해상도 장면 없이 결과만 굴린다
  state.promises.forEach(p=>{
    if(p.status!=='열림')return;
    const A=agents.find(x=>x.id===p.a), B=agents.find(x=>x.id===p.b); if(!A||!B)return;
    if(now()>p.due-4&&now()<p.due+6&&rnd()<.3){
      p.status='지킴'; A.kept++; B.kept++;
      A.rel[B.id]=clamp(A.rel[B.id]+5,0,100); B.rel[A.id]=clamp(B.rel[A.id]+5,0,100);
      report.kept=(report.kept||0)+1;
    } else if(now()>p.due+6){
      p.status='깨짐'; state.breachTotal++; A.breaches++;
      B.rel[A.id]=clamp(B.rel[A.id]-4,0,100);
      report.broken=(report.broken||0)+1;
    }
  });
  const g=state.gathering;
  if(g&&now()>g.endAt){
    const att=agents.filter(a=>a.known[g.newsId]&&a.rel[g.host]>55);
    if(att.length>=3){state.gatherWins=(state.gatherWins||0)+1;state.resources.문화=clamp(state.resources.문화+6,0,100);chron(`닫힌 시간 동안 「${g.title}」 모임이 열려 ${att.length}명이 다녀갔다.`,'행사')}
    else chron(`「${g.title}」 모임은 닫힌 시간 동안 조용히 지나갔다.`,'행사');
    state.gathering=null;
  }
  agents.forEach(a=>decayDesires(a,h));
  customTick();
  state.resources.활기=clamp(state.resources.활기-.05*h,0,100); state.resources.혼선=clamp(state.resources.혼선-.06*h,0,100);
  directorTick(h); fieldTick(h); // 감독·들녘은 닫힌 시간에도 같은 리듬을 지킨다
}
function catchUp(elapsedMs){
  const hours=Math.min(CATCHUP_CAP_HOURS,elapsedMs/1000*SIM_HOURS_PER_REAL_SEC);
  if(elapsedMs<CATCHUP_MIN_MS||hours<1)return;
  const report={days:0,progress:0,spread:0,social:0,completed:[],verified:[]};
  for(let t=0;t<hours;t+=.5)coarseStep(.5,report);
  state.scene=sceneText();
  const closedText=elapsedMs>3600000?`${Math.round(elapsedMs/3600000)}시간`:`${Math.max(1,Math.round(elapsedMs/60000))}분`;
  const capped=elapsedMs/1000*SIM_HOURS_PER_REAL_SEC>CATCHUP_CAP_HOURS;
  let text=`탭 밖에 있던 ${closedText} 동안 마을 시간 ${Math.round(hours)}시간이 저해상도로 흘렀다${capped?' (사흘치에서 멈춤)':''} — 프로젝트 +${Math.round(report.progress)}, 소식 전달 ${report.spread}회, 관계 표류 ${report.social}회.`;
  if(report.kept)text+=` 약속 ${report.kept}건이 지켜졌다.`;
  if(report.broken)text+=` 약속 ${report.broken}건이 어그러졌다.`;
  if(report.completed.length)text+=` 그 사이 ${report.completed.join(', ')}이 완성됐다.`;
  if(report.verified.length)text+=` “${report.verified[0].slice(0,24)}…”은 확인됐다.`;
  addLife(text,'따라잡기'); addRecentOp(`따라잡기 ${Math.round(hours)}시간 (코스 스텝 ${Math.ceil(hours/.5)}회)`);
  toast(`닫힌 시간 ${Math.round(hours)}시간을 따라잡았어`);
}
function save(silent){localStorage.setItem('ai-village-polished-research',JSON.stringify({state,agents,buildings,projects,skills,seed,memSeq,newsSeq,artifactSeq,inputSeq,promSeq,postSeq,gathSeq,savedAt:Date.now()}));if(silent!==true)toast('저장했어')}
function load(){try{const raw=localStorage.getItem('ai-village-polished-research');if(!raw)return false;const d=JSON.parse(raw);Object.assign(state,d.state);while(agents.length<d.agents.length)agents.push({});while(buildings.length<d.buildings.length)buildings.push({});d.agents.forEach((a,i)=>Object.assign(agents[i],a));d.buildings.forEach((b,i)=>Object.assign(buildings[i],b));d.projects.forEach((p,i)=>Object.assign(projects[i],p));skills.splice(0,skills.length,...d.skills);seed=d.seed||seed;memSeq=d.memSeq||memSeq;newsSeq=d.newsSeq||newsSeq;artifactSeq=d.artifactSeq||artifactSeq;inputSeq=d.inputSeq||inputSeq;promSeq=d.promSeq||promSeq;postSeq=d.postSeq||postSeq;gathSeq=d.gathSeq||gathSeq;agents.forEach(a=>{if(!a.pers)a.pers=basePers(a.role);if(!a.persLog)a.persLog=[];if(!a.desires)a.desires=[];if(!a.breaches)a.breaches=0;if(!a.kept)a.kept=0;if(!a.taste)a.taste=makeTaste()});buildings.forEach(b=>{if(!b.log)b.log=[];if(b.kind==='거처'&&!b.deco)b.deco=[]});if(!state.director)state.director={id:'cassandra',last:0,lastKind:'회복'};if(!state.chronicle)state.chronicle=[];if(!state.promises)state.promises=[];if(!state.posts)state.posts=[];if(!state.customs)state.customs=[];state.customs.forEach(c=>{if(!c.key)c.key='약속'});if(state.gathering===undefined)state.gathering=null;if(state.gathering&&!state.gathering.acts)state.gathering.acts=[];if(!state.breachTotal)state.breachTotal=0;agents.forEach(a=>{if(!a.lastTalkScores)a.lastTalkScores=[];if(a.vx===undefined){a.vx=0;a.vy=0}if(a.phase===undefined)a.phase=rnd()*6.3;if(!a.movedDay)a.movedDay=0});return {savedAt:d.savedAt||0}}catch(e){console.warn(e);return false}}
function reset(){localStorage.removeItem('ai-village-polished-research');location.reload()}
function sampleIncident(){return gen('사건')}
function loop(t){const dt=Math.min(.08,(t-last)/1000||0);last=t;if(!paused){acc+=dt;while(acc>.05){sim(.05);acc-=.05}}render();uiTimer+=dt;if(uiTimer>.55){updateUI();uiTimer=0}requestAnimationFrame(loop)}
function init(){
  const loaded=load();
  if(!state.field)state.field=buildField(); // 새 마을이든 구버전 세이브든 들녘부터 깐다
  if(loaded&&loaded.savedAt)catchUp(Date.now()-loaded.savedAt);
  if(!loaded){
    agents.forEach(a=>{memory(a,`${N(a.name,'eun')} ${a.role}로서 ${building(a.home).name}을 주 무대로 삼는다.`,[a.home,a.role,'정체성'],7,'기본',{},false);memory(a,`첫날 아침, ${N(a.name,'eun')} 광장에 켜지는 불빛을 보며 마을의 리듬을 익혔다.`,['마을','아침'],4,'관찰',{},false);buildPlan(a)});
    createNews('주말에 별빛 광장에서 작은 축제를 열자는 제안이 생겼다','초기 기억',[agents[1],agents[6]]);
    createNews('마을발전기 코어를 완성하면 반복 작업이 줄어들 수 있다','초기 기억',[agents[2],agents[0]]);
    addLife('AI 마을의 첫 아침이 열렸다. 주민들은 각자의 기억과 역할을 품고 움직이기 시작했다.','시작'); addTalk('챗사서','오늘은 대화가 끝나면 짧게 남겨둘게. 그래야 내일의 내가 덜 헤매니까.');
  }
  cvs.addEventListener('click',canvasPick); cvs.addEventListener('mousemove',canvasHover); cvs.addEventListener('mouseleave',()=>{hover=null;cvs.style.cursor='default'});
  // 마을 전체 패널 상단 탭 — 재렌더에도 살아남게 위임으로 묶는다
  $('#sideBody').addEventListener('click',e=>{const t=e.target.closest('[data-sidetab]');if(t&&t.dataset.sidetab!==sideTab){sideTab=t.dataset.sidetab;renderSide();$('#sideBody').scrollTop=0}});
  // 모바일 상단 탭 — 현황/관찰 탭은 사이드 패널의 해당 탭과 동기화된다
  $$('#mobileTabs [data-mtab]').forEach(b=>b.onclick=()=>{
    const v=b.dataset.mtab;
    if(v==='status'||v==='observe'){sideTab=v; if(selected)setSelected(null)}
    setMview(v);
  });
  // 복귀: ← 버튼과 폰/브라우저 뒤로가기 둘 다 '마을 전체'로 돌아온다
  $('#backBtn').onclick=()=>setSelected(null);
  window.addEventListener('popstate',()=>{if(selected){selected=null;updateUI()}});
  $('#seedForm').addEventListener('submit',e=>{e.preventDefault();const v=$('#seedText').value.trim();if(v)submitInput(v,'seed')}); $('#eventBtn').onclick=()=>submitInput(sampleIncident(),'incident');
  // 기질 편집기 (Kismet) — 저장된 기질은 시작할 때 조용히 적용된다
  const TEMPER_TEMPLATE=['# 마을 기질 — 한 줄에 규칙 하나. #으로 시작하면 주석.','#',
    '# ① 대화 수의 의지 기울이기:  <수> 의지 +N','#    수: '+SOCIAL_RULES.map(r=>r.move).join('·'),
    '# 갈등 의지 -6','# 화해 의지 +8','#',
    '# ② 문장 풀에 보태기:  문장 <풀>: <문장>   (#주제.eun# 같은 치환도 그대로 쓸 수 있어)',
    '# 문장 주제: 겨울 등불 축제','# 문장 맞장구: 그 말, 오래 두고 생각할게.','#',
    '# ③ 관습 심기:  관습: <문장>   /   관습(되물음): <문장>',
    '#    괄호 키가 되물음·화해·모임·약속이면 주민 행동에도 되먹인다',
    '# 관습: 저녁마다 광장에서 하루를 짧게 소리 내어 정리한다',''].join('\n');
  applyTemper(localStorage.getItem(TEMPER_KEY)||'');
  $('#temperBtn').onclick=()=>{$('#temperText').value=localStorage.getItem(TEMPER_KEY)||TEMPER_TEMPLATE;$('#temperMsg').textContent='';$('#temperMsg').classList.remove('ok');$('#temperWrap').hidden=false};
  $('#temperClose').onclick=()=>{$('#temperWrap').hidden=true};
  $('#temperWrap').addEventListener('click',e=>{if(e.target===$('#temperWrap'))$('#temperWrap').hidden=true});
  $('#temperClear').onclick=()=>{$('#temperText').value=TEMPER_TEMPLATE;$('#temperMsg').textContent='';$('#temperMsg').classList.remove('ok')};
  $('#temperApply').onclick=()=>{
    const text=$('#temperText').value, errors=applyTemper(text), msg=$('#temperMsg');
    localStorage.setItem(TEMPER_KEY,text);
    const nMoves=Object.keys(TEMPER.moves).length, nSent=Object.values(TEMPER.pools).reduce((s,x)=>s+x.length,0);
    msg.classList.toggle('ok',!errors.length);
    msg.textContent=errors.length?errors.join('\n'):`적용됐어 — 의지 조정 ${nMoves}개 · 추가 문장 ${nSent}개 · 심은 관습 ${TEMPER.customs.length}개`;
    if(!errors.length)toast('마을 기질이 스몄어');
    updateUI();
  };
  $('#pauseBtn').onclick=()=>{paused=!paused;$('#pauseBtn').textContent=paused?'다시 흐르게':'멈춤'}; $('#stepBtn').onclick=()=>{sim(.9);updateUI()}; $('#speedBtn').onclick=()=>{speed=speed===1?2:speed===2?4:1;$('#speedBtn').textContent=`속도 ${speed}x`}; $('#saveBtn').onclick=()=>save(); $('#resetBtn').onclick=reset; $('#directorBtn').onclick=cycleDirector; {const p=directorProfile();$('#directorBtn').textContent=`감독 ${p.icon} ${p.name}`}
  // Veloren rtsim 문법의 확장: 탭이 '닫힌' 시간만이 아니라 '가려진' 시간도 저해상도로 메꾼다
  // (rAF는 숨김 탭에서 멈추므로, 이 처리가 없으면 가려진 마을은 얼어붙는다)
  document.addEventListener('visibilitychange',()=>{
    if(document.visibilityState==='hidden'){save(true);hiddenAt=Date.now()}
    else if(hiddenAt){const el=Date.now()-hiddenAt;hiddenAt=0;if(!paused&&el>=CATCHUP_MIN_MS){catchUp(el);updateUI()}}
  }); window.addEventListener('beforeunload',()=>save(true)); setInterval(()=>save(true),30000);
  $$('.tab').forEach(tab=>tab.onclick=()=>{$$('.tab').forEach(t=>t.classList.remove('active'));$$('.panel').forEach(p=>p.classList.remove('active'));tab.classList.add('active');$('#panel-'+tab.dataset.tab).classList.add('active')});
  if('serviceWorker' in navigator&&location.protocol!=='file:')navigator.serviceWorker.register('sw.js').catch(()=>{});
  updateUI(); requestAnimationFrame(loop);
}
init();
})();
</script>
