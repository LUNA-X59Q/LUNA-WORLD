<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>AI BOX</title>
<meta name="theme-color" content="#10182b" />
<link rel="manifest" href="manifest.webmanifest" />
<link rel="icon" href="favicon.svg" type="image/svg+xml" />
<link rel="apple-touch-icon" href="apple-touch-icon.png" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="AI BOX" />
<style>
:root{
  color-scheme:dark;
  --bg:#060814;
  --surface:rgba(12,18,32,.8);
  --ink:#f4f8ff;
  --soft:#d9e4f5;
  --muted:#91a0b8;
  --line:rgba(255,255,255,.115);
  --line2:rgba(255,255,255,.18);
  --blue:#89d8ff;
  --violet:#d9b7ff;
  --shadow:0 20px 70px rgba(0,0,0,.4);
  --r:22px;
}
*{box-sizing:border-box}
html,body{margin:0}
body{min-height:100vh}
html{background:#060814}
body{
  color:var(--ink);
  font-family:ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",sans-serif;
  background:var(--bg);
  background-image:
    radial-gradient(circle at 12% -8%,rgba(137,216,255,.28),transparent 34%),
    radial-gradient(circle at 80% 0%,rgba(217,183,255,.18),transparent 31%);
  background-repeat:no-repeat;
}
button,input,textarea,select{font:inherit;color:inherit}
button{border:0;background:none;cursor:pointer}
button:focus-visible,input:focus-visible,textarea:focus-visible,select:focus-visible{outline:2px solid rgba(137,216,255,.72);outline-offset:2px}
.wrap{max-width:860px;margin:0 auto;padding:20px 16px 60px}
header{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:6px 2px 18px}
.brand{display:flex;align-items:center;gap:12px}
.mark{width:44px;height:44px;border-radius:15px;display:grid;place-items:center;color:#06101a;font-weight:900;font-size:15px;letter-spacing:-.04em;background:conic-gradient(from 220deg,var(--blue),var(--violet),#ffe28a,#a8f3bd,var(--blue));box-shadow:0 0 36px rgba(137,216,255,.2),inset 0 0 0 1px rgba(255,255,255,.5)}
.brand h1{margin:0;font-size:22px;letter-spacing:-.03em}
.writeBtn{padding:10px 16px;border-radius:14px;border:1px solid rgba(137,216,255,.34);background:linear-gradient(135deg,rgba(137,216,255,.22),rgba(217,183,255,.15));font-size:13px;font-weight:700;transition:.16s}
.writeBtn:hover{transform:translateY(-1px);background:rgba(137,216,255,.24)}
.tabs{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;padding-bottom:14px}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:10px 15px;border-radius:999px;border:1px solid var(--line);background:rgba(255,255,255,.05);color:var(--muted);font-size:13px;white-space:nowrap;transition:.16s}
.tab:hover{color:var(--soft);border-color:var(--line2)}
.tab.on{background:rgba(137,216,255,.14);border-color:rgba(137,216,255,.4);color:#fff;font-weight:700}
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:12px}
.card{position:relative;padding:16px;border:1px solid var(--line);border-radius:var(--r);background:linear-gradient(180deg,rgba(255,255,255,.06),rgba(255,255,255,.03));box-shadow:inset 0 1px 0 rgba(255,255,255,.05)}
.card h3{margin:0 0 8px;font-size:15px;letter-spacing:-.02em;padding-right:24px}
.card p{margin:0 0 10px;font-size:13px;line-height:1.6;color:var(--soft);white-space:pre-wrap;word-break:break-word}
.card time{font-size:11px;color:var(--muted)}
.card .del{position:absolute;top:12px;right:12px;width:26px;height:26px;border-radius:9px;display:grid;place-items:center;color:var(--muted);font-size:14px;transition:.16s}
.card .del:hover{background:rgba(255,154,170,.14);color:#ff9aaa}
.empty{grid-column:1/-1;border:1px dashed var(--line2);border-radius:var(--r);background:rgba(255,255,255,.025);padding:48px 20px;text-align:center;font-size:14px;line-height:1.7;color:var(--muted)}
dialog{border:1px solid var(--line2);border-radius:var(--r);background:var(--surface);color:var(--ink);padding:0;width:min(480px,calc(100vw - 32px));box-shadow:var(--shadow)}
dialog::backdrop{background:rgba(3,5,10,.6);backdrop-filter:blur(4px)}
dialog form{display:grid;gap:10px;padding:20px}
dialog h2{margin:0 0 4px;font-size:17px;letter-spacing:-.02em}
dialog select,dialog input,dialog textarea{border:1px solid var(--line);border-radius:13px;background:rgba(255,255,255,.05);padding:11px 12px;font-size:13px;outline:none}
dialog select:focus,dialog input:focus,dialog textarea:focus{border-color:rgba(137,216,255,.5)}
dialog select option{background:#10182b}
dialog textarea{min-height:120px;resize:vertical}
.actions{display:flex;gap:8px;justify-content:flex-end;margin-top:4px}
.actions button{padding:10px 15px;border-radius:13px;font-size:13px;border:1px solid var(--line);background:rgba(255,255,255,.05)}
.actions button.primary{border-color:rgba(137,216,255,.34);background:linear-gradient(135deg,rgba(137,216,255,.22),rgba(217,183,255,.15));font-weight:700}
@media(max-width:560px){
  .brand h1{font-size:19px}
  .mark{width:40px;height:40px;border-radius:13px;font-size:13px}
  .cards{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand"><div class="mark">AI</div><h1>AI BOX</h1></div>
    <button class="writeBtn" id="writeBtn">+ 카드 쓰기</button>
  </header>
  <nav class="tabs" id="tabs"></nav>
  <main class="cards" id="cards"></main>
</div>

<dialog id="writeDialog">
  <form method="dialog" id="writeForm">
    <h2>새 카드</h2>
    <select id="fCat"></select>
    <input id="fTitle" placeholder="제목" autocomplete="off" maxlength="80" required>
    <textarea id="fBody" placeholder="내용" maxlength="4000"></textarea>
    <div class="actions">
      <button type="button" id="cancelBtn">취소</button>
      <button type="submit" class="primary">남기기</button>
    </div>
  </form>
</dialog>

<script>
(()=>{
'use strict';
const CATS=['자유','정보','그림프롬프트','페르소나프롬프트'];
const KEY='ai-box-cards';
// 이전 앱(AI 마을 시뮬레이션)의 저장 데이터는 정리한다
['ai-village-polished-research','ai-village-temperament'].forEach(k=>localStorage.removeItem(k));

const $=s=>document.querySelector(s);
const esc=s=>String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
let cards=[];
try{cards=JSON.parse(localStorage.getItem(KEY))||[]}catch(e){cards=[]}
let cat=CATS[0];

const tabs=$('#tabs');
tabs.innerHTML=CATS.map(c=>`<button class="tab" data-cat="${c}">${c}</button>`).join('');
tabs.addEventListener('click',e=>{
  const b=e.target.closest('.tab'); if(!b)return;
  cat=b.dataset.cat; render();
});

const fCat=$('#fCat');
fCat.innerHTML=CATS.map(c=>`<option value="${c}">${c}</option>`).join('');

function fmt(t){
  const d=new Date(t);
  return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}
function save(){localStorage.setItem(KEY,JSON.stringify(cards))}
function render(){
  document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('on',b.dataset.cat===cat));
  const list=cards.filter(c=>c.cat===cat);
  $('#cards').innerHTML=list.length
    ?list.map(c=>`<article class="card" data-id="${c.id}"><h3>${esc(c.title)}</h3>${c.body?`<p>${esc(c.body)}</p>`:''}<time>${fmt(c.time)}</time><button class="del" aria-label="삭제">×</button></article>`).join('')
    :`<div class="empty">아직 카드가 없어.<br>오른쪽 위 <b>+ 카드 쓰기</b>로 첫 카드를 남겨봐.</div>`;
}
$('#cards').addEventListener('click',e=>{
  const del=e.target.closest('.del'); if(!del)return;
  const id=del.closest('.card').dataset.id;
  cards=cards.filter(c=>String(c.id)!==id);
  save(); render();
});

const dlg=$('#writeDialog');
$('#writeBtn').addEventListener('click',()=>{$('#writeForm').reset();fCat.value=cat;dlg.showModal()});
$('#cancelBtn').addEventListener('click',()=>dlg.close());
$('#writeForm').addEventListener('submit',()=>{
  const title=$('#fTitle').value.trim(); if(!title)return;
  cards.unshift({id:Date.now(),cat:fCat.value,title,body:$('#fBody').value.trim(),time:Date.now()});
  save(); cat=fCat.value; render();
});

render();
if('serviceWorker' in navigator&&location.protocol!=='file:')navigator.serviceWorker.register('sw.js').catch(()=>{});
})();
</script>
</body>
</html>
